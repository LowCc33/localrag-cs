<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalRAG-CS 数据导入</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 自定义样式 -->
    <style>
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
        
        /* 拖放区域样式 */
        .drop-zone {
            border: 3px dashed #d1d5db;
            transition: all 0.3s ease;
        }
        .drop-zone.drag-over {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        
        /* 进度条动画 */
        @keyframes progress {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }
        .progress-animate {
            background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 50%, #3b82f6 100%);
            background-size: 200% 100%;
            animation: progress 2s linear infinite;
        }
        
        /* 状态颜色 */
        .status-pending { color: #6b7280; }
        .status-processing { color: #3b82f6; }
        .status-completed { color: #10b981; }
        .status-failed { color: #ef4444; }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .container {
                padding-left: 1rem;
                padding-right: 1rem;
            }
            .stats-grid {
                grid-template-columns: repeat(1, 1fr) !important;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- 标题区域 -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-800 mb-3">
                <i class="fas fa-database text-blue-500 mr-3"></i>
                LocalRAG-CS 数据导入
            </h1>
            <p class="text-gray-600 text-lg">
                上传文档到知识库，支持PDF、TXT、MD、DOCX等格式
            </p>
        </div>

        <!-- 主内容区域 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 左侧：拖放上传区域 -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-6">
                        <i class="fas fa-cloud-upload-alt text-blue-500 mr-2"></i>
                        上传文档
                    </h2>
                    
                    <!-- 拖放区域 -->
                    <div id="dropZone" class="drop-zone rounded-xl p-10 text-center cursor-pointer mb-6">
                        <div class="mb-4">
                            <i class="fas fa-cloud-upload-alt text-5xl text-gray-400 mb-4"></i>
                        </div>
                        <p class="text-xl font-medium text-gray-700 mb-2">
                            拖放文件到这里，或点击选择文件
                        </p>
                        <p class="text-gray-500 mb-4">
                            支持 PDF, TXT, MD, DOCX, PPTX, XLSX, CSV, HTML 格式
                        </p>
                        <p class="text-sm text-gray-400">
                            单个文件最大 100MB
                        </p>
                        <input type="file" id="fileInput" multiple class="hidden">
                        <button id="selectFilesBtn" class="mt-6 px-6 py-3 bg-blue-500 text-white font-medium rounded-lg hover:bg-blue-600 transition-colors">
                            <i class="fas fa-folder-open mr-2"></i>
                            选择文件
                        </button>
                    </div>
                    
                    <!-- 文件列表 -->
                    <div id="fileList" class="mb-6">
                        <h3 class="text-lg font-medium text-gray-700 mb-3">待上传文件</h3>
                        <div id="filesContainer" class="space-y-3 max-h-60 overflow-y-auto p-2">
                            <!-- 文件列表将动态添加到这里 -->
                            <div id="noFilesMessage" class="text-center py-8 text-gray-500">
                                <i class="fas fa-file-alt text-3xl mb-3"></i>
                                <p>暂无待上传文件</p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 上传设置 -->
                    <div class="mb-6">
                        <h3 class="text-lg font-medium text-gray-700 mb-3">导入设置</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">
                                    分块大小（字符数）
                                </label>
                                <input type="range" id="chunkSize" min="100" max="2000" value="512" step="10" class="w-full">
                                <div class="flex justify-between text-sm text-gray-500">
                                    <span>100</span>
                                    <span id="chunkSizeValue">512</span>
                                    <span>2000</span>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">
                                    重叠大小（字符数）
                                </label>
                                <input type="range" id="chunkOverlap" min="0" max="200" value="50" step="5" class="w-full">
                                <div class="flex justify-between text-sm text-gray-500">
                                    <span>0</span>
                                    <span id="chunkOverlapValue">50</span>
                                    <span>200</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 上传按钮 -->
                    <div class="flex justify-end">
                        <button id="uploadBtn" class="px-8 py-3 bg-green-500 text-white font-medium rounded-lg hover:bg-green-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                            <i class="fas fa-upload mr-2"></i>
                            开始导入
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：统计面板 -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl shadow-lg p-6 sticky top-8">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-6">
                        <i class="fas fa-chart-bar text-blue-500 mr-2"></i>
                        统计面板
                    </h2>
                    
                    <div class="stats-grid grid grid-cols-1 gap-4">
                        <!-- 总文档数 -->
                        <div class="bg-blue-50 rounded-lg p-4">
                            <div class="flex items-center">
                                <div class="bg-blue-100 p-3 rounded-lg mr-4">
                                    <i class="fas fa-file-alt text-blue-500 text-xl"></i>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-600">总文档数</p>
                                    <p id="totalDocs" class="text-2xl font-bold text-gray-800">0</p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 总Chunks数 -->
                        <div class="bg-green-50 rounded-lg p-4">
                            <div class="flex items-center">
                                <div class="bg-green-100 p-3 rounded-lg mr-4">
                                    <i class="fas fa-layer-group text-green-500 text-xl"></i>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-600">总Chunks数</p>
                                    <p id="totalChunks" class="text-2xl font-bold text-gray-800">0</p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 总占用空间 -->
                        <div class="bg-purple-50 rounded-lg p-4">
                            <div class="flex items-center">
                                <div class="bg-purple-100 p-3 rounded-lg mr-4">
                                    <i class="fas fa-hdd text-purple-500 text-xl"></i>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-600">总占用空间</p>
                                    <p id="totalSize" class="text-2xl font-bold text-gray-800">0 MB</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 最近活动 -->
                    <div class="mt-8">
                        <h3 class="text-lg font-medium text-gray-700 mb-3">最近活动</h3>
                        <div id="recentActivity" class="space-y-3 max-h-60 overflow-y-auto">
                            <!-- 活动记录将动态添加到这里 -->
                            <div class="text-center py-4 text-gray-500">
                                <i class="fas fa-history text-xl mb-2"></i>
                                <p class="text-sm">暂无活动记录</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 导入队列 -->
        <div class="mt-8">
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold text-gray-800">
                        <i class="fas fa-tasks text-blue-500 mr-2"></i>
                        导入队列
                    </h2>
                    <button id="refreshQueueBtn" class="px-4 py-2 bg-gray-100 text-gray-700 font-medium rounded-lg hover:bg-gray-200 transition-colors">
                        <i class="fas fa-sync-alt mr-2"></i>
                        刷新
                    </button>
                </div>
                
                <div id="queueContainer" class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead>
                            <tr class="bg-gray-50">
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">任务ID</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">进度</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">文件数</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Chunks数</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">开始时间</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                            </tr>
                        </thead>
                        <tbody id="queueBody" class="bg-white divide-y divide-gray-200">
                            <!-- 队列数据将动态添加到这里 -->
                            <tr id="noTasksMessage">
                                <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                                    <i class="fas fa-inbox text-3xl mb-3"></i>
                                    <p>暂无导入任务</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // API基础URL
        const API_BASE = 'http://localhost:8000/api';
        
        // 全局状态
        let selectedFiles = [];
        let activeTasks = new Map(); // task_id -> task_data
        let refreshInterval = null;
        
        // DOM元素
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const selectFilesBtn = document.getElementById('selectFilesBtn');
        const filesContainer = document.getElementById('filesContainer');
        const noFilesMessage = document.getElementById('noFilesMessage');
        const uploadBtn = document.getElementById('uploadBtn');
        const chunkSizeSlider = document.getElementById('chunkSize');
        const chunkSizeValue = document.getElementById('chunkSizeValue');
        const chunkOverlapSlider = document.getElementById('chunkOverlap');
        const chunkOverlapValue = document.getElementById('chunkOverlapValue');
        const refreshQueueBtn = document.getElementById('refreshQueueBtn');
        const queueBody = document.getElementById('queueBody');
        const noTasksMessage = document.getElementById('noTasksMessage');
        const totalDocsEl = document.getElementById('totalDocs');
        const totalChunksEl = document.getElementById('totalChunks');
        const totalSizeEl = document.getElementById('totalSize');
        const recentActivityEl = document.getElementById('recentActivity');
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initEventListeners();
            updateSliderValues();
            loadStatistics();
            loadQueue();
            startAutoRefresh();
        });
        
        // 初始化事件监听器
        function initEventListeners() {
            // 拖放事件
            dropZone.addEventListener('dragover', handleDragOver);
            dropZone.addEventListener('dragleave', handleDragLeave);
            dropZone.addEventListener('drop', handleDrop);
            
            // 点击选择文件
            selectFilesBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', handleFileSelect);
            
            // 滑块事件
            chunkSizeSlider.addEventListener('input', updateSliderValues);
            chunkOverlapSlider.addEventListener('input', updateSliderValues);
            
            // 上传按钮
            uploadBtn.addEventListener('click', handleUpload);
            
            // 刷新队列
            refreshQueueBtn.addEventListener('click', loadQueue);
        }
        
        // 更新滑块显示值
        function updateSliderValues() {
            chunkSizeValue.textContent = chunkSizeSlider.value;
            chunkOverlapValue.textContent = chunkOverlapSlider.value;
        }
        
        // 拖放事件处理
        function handleDragOver(e) {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        }
        
        function handleDragLeave(e) {
            e.preventDefault();
            if (!dropZone.contains(e.relatedTarget)) {
                dropZone.classList.remove('drag-over');
            }
        }
        
        function handleDrop(e) {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            
            const files = Array.from(e.dataTransfer.files);
            addFiles(files);
        }
        
        // 文件选择处理
        function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            addFiles(files);
            fileInput.value = ''; // 重置input
        }
        
        // 添加文件到列表
        function addFiles(files) {
            // 过滤不支持的文件类型
            const validFiles = files.filter(file => {
                const ext = file.name.split('.').pop().toLowerCase();
                const allowed = ['pdf', 'txt', 'md', 'docx', 'pptx', 'xlsx', 'csv', 'html'];
                return allowed.includes(ext);
            });
            
            // 检查文件大小
            const sizeValidFiles = validFiles.filter(file => {
                const maxSize = 100 * 1024 * 1024; // 100MB
                if (file.size > maxSize) {
                    showToast(`文件 ${file.name} 超过100MB限制`, 'error');
                    return false;
                }
                return true;
            });
            
            // 添加到选中文件列表
            selectedFiles = [...selectedFiles, ...sizeValidFiles];
            
            // 更新UI
            updateFileList();
            updateUploadButton();
            
            if (sizeValidFiles.length > 0) {
                showToast(`添加了 ${sizeValidFiles.length} 个文件`, 'success');
            }
        }
        
        // 更新文件列表UI
        function updateFileList() {
            // 清空容器
            filesContainer.innerHTML = '';
            
            if (selectedFiles.length === 0) {
                filesContainer.appendChild(noFilesMessage);
                noFilesMessage.style.display = 'block';
                return;
            }
            
            noFilesMessage.style.display = 'none';
            
            // 添加每个文件
            selectedFiles.forEach((file, index) => {
                const fileEl = createFileElement(file, index);
                filesContainer.appendChild(fileEl);
            });
        }
        
        // 创建文件元素
        function createFileElement(file, index) {
            const div = document.createElement('div');
            div.className = 'flex items-center justify-between p-3 bg-gray-50 rounded-lg';
            
            const fileSize = formatFileSize(file.size);
            const fileIcon = getFileIcon(file.name);
            
            div.innerHTML = `
                <div class="flex items-center">
                    <div class="mr-3 text-xl ${fileIcon.color}">
                        <i class="${fileIcon.icon}"></i>
                    </div>
                    <div>
                        <p class="font-medium text-gray-800 truncate max-w-xs">${file.name}</p>
                        <p class="text-sm text-gray-500">${fileSize}</p>
                    </div>
                </div>
                <button class="remove-file-btn text-red-500 hover:text-red-700 p-2" data-index="${index}">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            // 添加删除事件
            const removeBtn = div.querySelector('.remove-file-btn');
            removeBtn.addEventListener('click', () => removeFile(index));
            
            return div;
        }
        
        // 获取文件图标
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            
            const icons = {
                pdf: { icon: 'fas fa-file-pdf', color: 'text-red-500' },
                txt: { icon: 'fas fa-file-alt', color: 'text-gray-500' },
                md: { icon: 'fas fa-file-code', color: 'text-blue-500' },
                docx: { icon: 'fas fa-file-word', color: 'text-blue-600' },
                pptx: { icon: 'fas fa-file-powerpoint', color: 'text-orange-500' },
                xlsx: { icon: 'fas fa-file-excel', color: 'text-green-500' },
                csv: { icon: 'fas fa-file-csv', color: 'text-green-600' },
                html: { icon: 'fas fa-file-code', color: 'text-purple-500' }
            };
            
            return icons[ext] || { icon: 'fas fa-file', color: 'text-gray-400' };
        }
        
        // 移除文件
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
            updateUploadButton();
        }
        
        // 更新上传按钮状态
        function updateUploadButton() {
            uploadBtn.disabled = selectedFiles.length === 0;
        }
        
        // 处理上传
        async function handleUpload() {
            if (selectedFiles.length === 0) return;
            
            // 禁用上传按钮
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>上传中...';
            
            try {
                // 创建FormData
                const formData = new FormData();
                
                // 添加文件
                selectedFiles.forEach(file => {
                    formData.append('files', file);
                });
                
                // 添加设置
                formData.append('chunk_size', chunkSizeSlider.value);
                formData.append('chunk_overlap', chunkOverlapSlider.value);
                
                // 发送请求
                const response = await fetch(`${API_BASE}/ingest/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error(`上传失败: ${response.status}`);
                }
                
                const result = await response.json();
                
                // 显示成功消息
                showToast(`任务 ${result.task_id} 创建成功`, 'success');
                
                // 添加到活动任务
                activeTasks.set(result.task_id, result);
                
                // 清空文件列表
                selectedFiles = [];
                updateFileList();
                updateUploadButton();
                
                // 刷新队列
                loadQueue();
                
            } catch (error) {
                console.error('上传失败:', error);
                showToast(`上传失败: ${error.message}`, 'error');
            } finally {
                // 恢复上传按钮
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '<i class="fas fa-upload mr-2"></i>开始导入';
            }
        }
        
        // 加载统计信息
        async function loadStatistics() {
            try {
                // 获取文档列表
                const response = await fetch(`${API_BASE}/ingest/documents?limit=1000`);
                if (!response.ok) return;
                
                const data = await response.json();
                
                // 计算统计
                let totalDocs = 0;
                let totalChunks = 0;
                let totalSize = 0;
                
                if (data.documents && Array.isArray(data.documents)) {
                    totalDocs = data.documents.length;
                    totalChunks = data.documents.reduce((sum, doc) => sum + (doc.chunks || 0), 0);
                    // 这里可以根据实际情况计算大小
                    totalSize = Math.round(totalDocs * 0.1); // 模拟：每个文档约0.1MB
                }
                
                // 更新UI
                totalDocsEl.textContent = totalDocs;
                totalChunksEl.textContent = totalChunks.toLocaleString();
                totalSizeEl.textContent = `${totalSize} MB`;
                
                // 更新最近活动
                updateRecentActivity(data.documents || []);
                
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }
        
        // 更新最近活动
        function updateRecentActivity(documents) {
            recentActivityEl.innerHTML = '';
            
            if (documents.length === 0) {
                recentActivityEl.innerHTML = `
                    <div class="text-center py-4 text-gray-500">
                        <i class="fas fa-history text-xl mb-2"></i>
                        <p class="text-sm">暂无活动记录</p>
                    </div>
                `;
                return;
            }
            
            // 按时间排序，取最近5个
            const recent = documents
                .sort((a, b) => new Date(b.import_time) - new Date(a.import_time))
                .slice(0, 5);
            
            recent.forEach(doc => {
                const activityEl = document.createElement('div');
                activityEl.className = 'flex items-center p-3 bg-gray-50 rounded-lg';
                
                const time = new Date(doc.import_time).toLocaleTimeString('zh-CN', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                activityEl.innerHTML = `
                    <div class="mr-3 text-green-500">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-medium text-gray-800 truncate">${doc.title}</p>
                        <p class="text-xs text-gray-500">${time} • ${doc.chunks || 0} chunks</p>
                    </div>
                `;
                
                recentActivityEl.appendChild(activityEl);
            });
        }
        
        // 加载队列
        async function loadQueue() {
            try {
                // 在实际应用中，这里应该调用API获取所有任务状态
                // 由于API限制，我们这里模拟显示活动任务
                
                queueBody.innerHTML = '';
                
                if (activeTasks.size === 0) {
                    queueBody.appendChild(noTasksMessage);
                    noTasksMessage.style.display = 'table-row';
                    return;
                }
                
                noTasksMessage.style.display = 'none';
                
                // 为每个活动任务获取最新状态
                for (const [taskId, task] of activeTasks) {
                    try {
                        const response = await fetch(`${API_BASE}/ingest/status/${taskId}`);
                        if (!response.ok) {
                            // 如果任务不存在或已完成，从活动任务中移除
                            activeTasks.delete(taskId);
                            continue;
                        }
                        
                        const taskStatus = await response.json();
                        activeTasks.set(taskId, taskStatus);
                        
                        // 创建表格行
                        const row = createQueueRow(taskStatus);
                        queueBody.appendChild(row);
                        
                        // 如果任务已完成或失败，稍后从活动任务中移除
                        if (taskStatus.status === 'completed' || taskStatus.status === 'failed') {
                            setTimeout(() => {
                                activeTasks.delete(taskId);
                                if (activeTasks.size === 0) {
                                    loadQueue(); // 刷新队列显示
                                }
                            }, 5000); // 5秒后移除
                        }
                        
                    } catch (error) {
                        console.error(`获取任务 ${taskId} 状态失败:`, error);
                    }
                }
                
            } catch (error) {
                console.error('加载队列失败:', error);
            }
        }
        
        // 创建队列行
        function createQueueRow(task) {
            const row = document.createElement('tr');
            row.className = 'hover:bg-gray-50';
            
            // 状态标签
            let statusBadge = '';
            let statusClass = '';
            
            switch (task.status) {
                case 'pending':
                    statusBadge = '<span class="px-2 py-1 text-xs font-medium rounded-full bg-gray-100 text-gray-800">排队中</span>';
                    statusClass = 'status-pending';
                    break;
                case 'processing':
                    statusBadge = '<span class="px-2 py-1 text-xs font-medium rounded-full bg-blue-100 text-blue-800">导入中</span>';
                    statusClass = 'status-processing';
                    break;
                case 'completed':
                    statusBadge = '<span class="px-2 py-1 text-xs font-medium rounded-full bg-green-100 text-green-800">已完成</span>';
                    statusClass = 'status-completed';
                    break;
                case 'failed':
                    statusBadge = '<span class="px-2 py-1 text-xs font-medium rounded-full bg-red-100 text-red-800">失败</span>';
                    statusClass = 'status-failed';
                    break;
            }
            
            // 进度条
            const progress = task.progress || 0;
            const progressBar = `
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div class="bg-blue-500 h-2 rounded-full transition-all duration-300" style="width: ${progress}%"></div>
                </div>
                <div class="text-xs text-gray-500 mt-1">${progress}%</div>
            `;
            
            // 时间格式化
            const startTime = task.start_time ? 
                new Date(task.start_time).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : 
                '-';
            
            row.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="text-sm font-mono text-gray-900">${task.task_id.substring(0, 8)}...</div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="${statusClass}">${statusBadge}</div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="w-32">${progressBar}</div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                    ${task.processed_files || 0}/${task.total_files || 0}
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                    ${task.processed_chunks || 0}/${task.total_chunks || 0}
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                    ${startTime}
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                    <button class="text-blue-600 hover:text-blue-900 view-task-btn" data-task-id="${task.task_id}">
                        查看
                    </button>
                </td>
            `;
            
            // 添加查看按钮事件
            const viewBtn = row.querySelector('.view-task-btn');
            viewBtn.addEventListener('click', () => viewTaskDetails(task.task_id));
            
            return row;
        }
        
        // 查看任务详情
        function viewTaskDetails(taskId) {
            // 在实际应用中，可以打开模态框显示详细信息
            alert(`任务ID: ${taskId}\n详细功能将在后续版本中实现`);
        }
        
        // 开始自动刷新
        function startAutoRefresh() {
            // 每10秒刷新一次队列
            refreshInterval = setInterval(() => {
                if (activeTasks.size > 0) {
                    loadQueue();
                }
            }, 10000);
            
            // 每30秒刷新一次统计
            setInterval(loadStatistics, 30000);
        }
        
        // 工具函数：格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }
        
        // 工具函数：显示Toast通知
        function showToast(message, type = 'info') {
            // 创建Toast元素
            const toast = document.createElement('div');
            toast.className = `fixed top-4 right-4 z-50 px-6 py-3 rounded-lg shadow-lg transform transition-all duration-300 translate-x-full`;
            
            // 根据类型设置样式
            const styles = {
                success: 'bg-green-500 text-white',
                error: 'bg-red-500 text-white',
                info: 'bg-blue-500 text-white',
                warning: 'bg-yellow-500 text-white'
            };
            
            toast.className += ` ${styles[type] || styles.info}`;
            toast.innerHTML = `
                <div class="flex items-center">
                    <i class="fas fa-${type === 'success' ? 'check' : type === 'error' ? 'exclamation' : 'info'}-circle mr-3"></i>
                    <span>${message}</span>
                </div>
            `;
            
            // 添加到页面
            document.body.appendChild(toast);
            
            // 显示动画
            setTimeout(() => {
                toast.classList.remove('translate-x-full');
                toast.classList.add('translate-x-0');
            }, 10);
            
            // 3秒后移除
            setTimeout(() => {
                toast.classList.remove('translate-x-0');
                toast.classList.add('translate-x-full');
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.parentNode.removeChild(toast);
                    }
                }, 300);
            }, 3000);
        }
        
        // 错误处理
        window.addEventListener('unhandledrejection', event => {
            console.error('未处理的Promise拒绝:', event.reason);
            showToast('发生未知错误，请检查控制台', 'error');
        });
    </script>
</body>
</html>

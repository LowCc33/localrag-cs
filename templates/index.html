<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalRAG-CS 智能问答</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============ 全局 ============ */
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3a3a5c; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4a6c; }

        /* ============ 顶栏 ============ */
        .topbar {
            background: #1e1e2e;
            border-bottom: 1px solid #2a2a4a;
            padding: 0 20px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 10;
        }
        .topbar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .topbar-logo .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #6c63ff, #7c6fff);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            color: #fff;
        }
        .topbar-logo .logo-text {
            font-size: 16px;
            font-weight: 700;
            color: #e0e0e0;
            letter-spacing: 0.5px;
        }
        .topbar-logo .logo-sub {
            font-size: 11px;
            color: #7a7a9a;
            margin-left: 4px;
        }

        /* ============ 对话区 ============ */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: #3a3a5c; border-radius: 3px; }

        .chat-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* ============ 消息 ============ */
        .msg-row {
            display: flex;
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease;
        }
        .msg-row-user { justify-content: flex-end; }
        .msg-row-ai { justify-content: flex-start; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .msg-bubble-user {
            background: #2d2d5e;
            color: #e0e0e0;
            border-bottom-right-radius: 4px;
        }
        .msg-bubble-ai {
            background: transparent;
            color: #e0e0e0;
            padding: 4px 0;
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
            margin-right: 10px;
        }
        .msg-avatar-ai {
            background: linear-gradient(135deg, #6c63ff, #7c6fff);
            color: #fff;
        }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .msg-role-label {
            font-size: 12px;
            font-weight: 600;
            color: #9e9e9e;
        }

        /* ============ 答案底部信息 ============ */
        .answer-footer {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            color: #7a7a9a;
        }
        .answer-footer .latency-item {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .answer-footer .latency-item i {
            font-size: 10px;
        }
        .source-toggle-btn {
            font-size: 11px;
            color: #6c63ff;
            cursor: pointer;
            background: none;
            border: none;
            padding: 2px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .source-toggle-btn:hover {
            background: rgba(108, 99, 255, 0.1);
        }

        /* ============ 来源折叠面板 ============ */
        .sources-panel {
            margin-top: 8px;
            border-left: 2px solid #2a2a4a;
            padding-left: 12px;
        }
        .source-item {
            padding: 8px 10px;
            margin-bottom: 6px;
            background: #1e1e2e;
            border-radius: 8px;
            border: 1px solid #2a2a4a;
            font-size: 12px;
        }
        .source-item .source-title {
            font-weight: 600;
            color: #c0c0e0;
        }
        .source-item .source-content {
            color: #9e9e9e;
            margin-top: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .source-item .source-score {
            font-size: 10px;
            color: #7a7a9a;
            margin-top: 4px;
        }

        /* ============ 缓存徽章 ============ */
        .cache-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 700;
            color: #fff;
        }
        .cache-badge-hit { background: #2d6a4f; }
        .cache-badge-miss { background: #5a5a7a; }
        .cache-badge .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #fff;
        }

        /* ============ 输入区 ============ */
        .input-area {
            background: #1e1e2e;
            border-top: 1px solid #2a2a4a;
            padding: 12px 20px 16px;
            flex-shrink: 0;
        }
        .input-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: #2a2a4a;
            border-radius: 16px;
            padding: 8px 12px;
            border: 1px solid #3a3a5c;
            transition: border-color 0.2s;
        }
        .input-container:focus-within {
            border-color: #6c63ff;
        }
        .input-container textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #e0e0e0;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            max-height: 120px;
            padding: 4px 0;
            font-family: inherit;
        }
        .input-container textarea::placeholder {
            color: #5a5a7a;
        }
        .input-container .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #6c63ff;
            color: #fff;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, opacity 0.2s;
        }
        .input-container .send-btn:hover { background: #7c6fff; }
        .input-container .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .input-container .send-btn i { font-size: 14px; }

        /* 齿轮按钮 */
        .gear-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: transparent;
            color: #5a5a7a;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: color 0.2s, background 0.2s;
        }
        .gear-btn:hover { color: #9e9e9e; background: rgba(255,255,255,0.05); }

        /* ============ 参数面板（齿轮弹出） ============ */
        .params-panel {
            max-width: 800px;
            margin: 0 auto 8px;
            background: #2a2a4a;
            border: 1px solid #3a3a5c;
            border-radius: 12px;
            padding: 12px 16px;
            display: none;
        }
        .params-panel.open { display: block; }
        .params-panel .param-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .params-panel .param-row:last-child { margin-bottom: 0; }
        .params-panel label {
            font-size: 12px;
            color: #9e9e9e;
            min-width: 70px;
            flex-shrink: 0;
        }
        .params-panel input, .params-panel select {
            background: #1e1e2e;
            border: 1px solid #3a3a5c;
            border-radius: 6px;
            padding: 4px 8px;
            color: #e0e0e0;
            font-size: 12px;
            outline: none;
            width: 80px;
        }
        .params-panel input:focus, .params-panel select:focus {
            border-color: #6c63ff;
        }

        /* ============ 空状态 ============ */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #5a5a7a;
            text-align: center;
            padding: 40px 20px;
        }
        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.6;
        }
        .empty-state h2 {
            font-size: 18px;
            font-weight: 600;
            color: #9e9e9e;
            margin-bottom: 8px;
        }
        .empty-state p {
            font-size: 13px;
            color: #5a5a7a;
            max-width: 400px;
        }

        /* ============ 打字光标 ============ */
        .typing-cursor::after {
            content: '▊';
            animation: blink 1s step-end infinite;
            color: #6c63ff;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        /* ============ 加载中动画（AI 等待） ============ */
        .thinking-dots {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 8px 0;
        }
        .thinking-dots span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #6c63ff;
            animation: dotPulse 1.4s infinite ease-in-out both;
        }
        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0s; }
        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ============ 导出下拉 ============ */
        .export-dropdown {
            background: #2a2a4a;
            border: 1px solid #3a3a5c;
            border-radius: 12px;
            padding: 12px;
            min-width: 240px;
        }
        .export-dropdown .export-label {
            font-size: 11px;
            color: #7a7a9a;
            margin-bottom: 6px;
        }
        .export-dropdown .export-path-display {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: #1e1e2e;
            border: 1px solid #3a3a5c;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            color: #9e9e9e;
            transition: border-color 0.2s;
        }
        .export-dropdown .export-path-display:hover { border-color: #6c63ff; }
        .export-dropdown .export-btns {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .export-dropdown .export-btns button {
            flex: 1;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #3a3a5c;
            background: transparent;
            color: #c0c0e0;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .export-dropdown .export-btns button:hover { background: rgba(108,99,255,0.1); }

        /* ============ 目录树（导出路径） ============ */
        .path-tree {
            background: #1e1e2e;
            border: 1px solid #3a3a5c;
            border-radius: 8px;
            margin-top: 4px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .path-tree.open { display: block; }
        .path-tree .tree-item {
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            color: #c0c0e0;
            border-radius: 4px;
            transition: background 0.15s;
        }
        .path-tree .tree-item:hover { background: rgba(108,99,255,0.1); }
        .path-tree .tree-arrow { color: #5a5a7a; width: 12px; text-align: center; font-size: 9px; }
        .path-tree .tree-children { padding-left: 14px; }
        .path-tree .tree-section-label {
            font-size: 9px;
            color: #5a5a7a;
            padding: 4px 8px 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .path-tree .tree-manual-input {
            display: flex;
            gap: 4px;
            padding: 4px 8px;
        }
        .path-tree .tree-manual-input input {
            flex: 1;
            background: #2a2a4a;
            border: 1px solid #3a3a5c;
            border-radius: 4px;
            padding: 2px 6px;
            color: #e0e0e0;
            font-size: 10px;
            outline: none;
        }
        .path-tree .tree-manual-input button {
            padding: 2px 8px;
            background: #6c63ff;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
        }

        /* ============ 顶部按钮 ============ */
        .topbar-btn {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #3a3a5c;
            background: transparent;
            color: #9e9e9e;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .topbar-btn:hover {
            border-color: #6c63ff;
            color: #c0c0e0;
        }
        .topbar-btn-primary {
            background: #6c63ff;
            color: #fff;
            border-color: #6c63ff;
        }
        .topbar-btn-primary:hover {
            background: #7c6fff;
        }

        /* ============ 缓存统计（齿轮面板内） ============ */
        .cache-stat-inline {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #3a3a5c;
        }
        .cache-stat-inline .stat-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 11px;
            color: #7a7a9a;
        }
        .cache-stat-inline .stat-row span {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .cache-stat-inline .stat-row .num {
            color: #c0c0e0;
            font-weight: 600;
        }
        .cache-stat-inline .flush-btn {
            font-size: 10px;
            color: #e74c3c;
            cursor: pointer;
            background: none;
            border: none;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .cache-stat-inline .flush-btn:hover { background: rgba(231,76,60,0.1); }

        /* ============ 侧边栏 ============ */
        .app-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: #1e1e2e;
            border-right: 1px solid #2a2a4a;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-header h3 {
            font-size: 13px;
            font-weight: 600;
            color: #9e9e9e;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar-new-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: transparent;
            border: 1px solid #3a3a5c;
            color: #9e9e9e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.2s;
        }
        .sidebar-new-btn:hover {
            background: rgba(108,99,255,0.1);
            border-color: #6c63ff;
            color: #c0c0e0;
        }
        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .sidebar-list::-webkit-scrollbar { width: 4px; }
        .sidebar-list::-webkit-scrollbar-thumb { background: #3a3a5c; border-radius: 2px; }

        .session-item {
            padding: 10px 16px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: background 0.15s;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .session-item:hover {
            background: rgba(255,255,255,0.03);
        }
        .session-item.active {
            background: rgba(108,99,255,0.08);
            border-left-color: #6c63ff;
        }
        .session-item .session-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
            color: #6c63ff;
        }
        .session-item .session-info {
            flex: 1;
            min-width: 0;
        }
        .session-item .session-title {
            font-size: 13px;
            color: #c0c0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }
        .session-item .session-meta {
            font-size: 10px;
            color: #5a5a7a;
            margin-top: 2px;
        }
        .session-item .session-del {
            opacity: 0;
            width: 22px;
            height: 22px;
            border-radius: 4px;
            background: transparent;
            border: none;
            color: #5a5a7a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            flex-shrink: 0;
            transition: all 0.15s;
            margin-top: 2px;
        }
        .session-item:hover .session-del {
            opacity: 1;
        }
        .session-item .session-del:hover {
            color: #e74c3c;
            background: rgba(231,76,60,0.1);
        }

        /* 汉堡按钮（移动端/窄屏） */
        .sidebar-toggle {
            display: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: transparent;
            border: 1px solid #3a3a5c;
            color: #9e9e9e;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }
        .sidebar-toggle:hover {
            border-color: #6c63ff;
            color: #c0c0e0;
        }

        /* 右侧主区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* 响应式：窄屏隐藏侧边栏，显示汉堡按钮 */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 56px;
                bottom: 0;
                z-index: 30;
                transform: translateX(-100%);
                box-shadow: 4px 0 20px rgba(0,0,0,0.3);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-toggle {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <!-- ============ 顶栏 ============ -->
    <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
            <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="切换侧边栏">
                <i class="fas fa-bars"></i>
            </button>
            <div class="topbar-logo">
                <div class="logo-icon">R</div>
                <span class="logo-text">LocalRAG-CS</span>
                <span class="logo-sub">智能问答</span>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
            <button class="topbar-btn" onclick="window.location.href='/ingest'">
                <i class="fas fa-database"></i>知识库管理
            </button>
            <button class="topbar-btn" onclick="window.location.href='/chunks'">
                <i class="fas fa-cubes"></i>Chunk 管理
            </button>
            <button class="topbar-btn" onclick="window.location.href='/agent'">
                <i class="fas fa-robot"></i>Agent 模式
            </button>
            <div class="relative" id="export-dropdown-container">
                <button id="export-btn" class="topbar-btn" title="导出报告">
                    <i class="fas fa-download"></i>导出
                </button>
                <div id="export-dropdown" class="hidden absolute right-0 top-full mt-2 export-dropdown z-20">
                    <div class="export-label">保存到</div>
                    <div class="relative" id="export-path-wrapper">
                        <div class="export-path-display" id="export-path-display">
                            <i class="fas fa-folder text-yellow-500"></i>
                            <span id="export-path-text" class="flex-1">浏览器下载</span>
                            <i class="fas fa-chevron-down text-gray-500 text-[10px]"></i>
                        </div>
                        <div id="export-path-tree" class="path-tree">
                            <div id="export-path-tree-content" class="py-1">
                                <div class="text-center py-3 text-gray-500 text-xs"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
                            </div>
                        </div>
                    </div>
                    <div id="export-path-hint" class="text-xs mt-1 hidden" style="color:#7a7a9a;"></div>
                    <div class="export-btns">
                        <button id="export-pdf-btn"><i class="fas fa-file-pdf text-red-400"></i> PDF</button>
                        <button id="export-docx-btn"><i class="fas fa-file-word text-blue-400"></i> Word</button>
                    </div>
                </div>
            </div>
            <div id="status-indicator" style="display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(45,106,79,0.2);border-radius:9999px;font-size:11px;color:#52c41a;">
                <div style="width:6px;height:6px;background:#52c41a;border-radius:50%;"></div>
                运行中
            </div>
        </div>
    </header>

    <!-- ============ 主体布局（侧边栏 + 主内容） ============ -->
    <div class="app-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-comments"></i> 会话历史</h3>
                <button class="sidebar-new-btn" onclick="createNewSession()" title="新建会话">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <div class="sidebar-list" id="sidebar-list">
                <div class="text-center text-gray-500 py-8 text-xs">
                    <i class="fas fa-spinner fa-spin text-sm mb-2"></i>
                    <p>加载中...</p>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- ============ 对话区 ============ -->
            <div class="chat-area" id="chat-area">
                <div class="chat-container" id="chat-container">
                    <!-- 空状态 -->
                    <div class="empty-state" id="empty-state">
                        <div class="empty-icon">💬</div>
                        <h2>开始问答</h2>
                        <p>输入您的问题，LocalRAG 将检索知识库并生成答案</p>
                    </div>
                    <!-- 对话流消息将动态插入到这里 -->
                    <div id="message-list"></div>
                </div>
            </div>

            <!-- ============ 输入区 ============ -->
            <div class="input-area">
        <!-- 参数面板（齿轮弹出） -->
        <div class="params-panel" id="params-panel">
            <div class="param-row">
                <label>召回数量</label>
                <input type="number" id="top-k" value="10" min="1" max="50">
                <label style="margin-left:12px;">重排数量</label>
                <input type="number" id="rerank-top-k" value="3" min="1" max="10">
                <label style="margin-left:12px;">索引</label>
                <input type="text" id="index-name" value="cs_knowledge_base" style="width:120px;">
            </div>
            <!-- 缓存统计折叠到齿轮面板 -->
            <div class="cache-stat-inline" id="cache-stat-inline">
                <div class="stat-row">
                    <span>⚡ 缓存</span>
                    <span>总查询: <span class="num" id="stat-total">0</span></span>
                    <span>HIT: <span class="num" id="stat-hit" style="color:#52c41a;">0</span></span>
                    <span>MISS: <span class="num" id="stat-miss">0</span></span>
                    <span>命中率: <span class="num" id="stat-hitrate">0%</span></span>
                    <span>HIT均: <span class="num" id="stat-avg-hit">- ms</span></span>
                    <span>MISS均: <span class="num" id="stat-avg-miss">- ms</span></span>
                    <span id="cache-availability" style="color:#5a5a7a;">检测中…</span>
                    <button class="flush-btn" onclick="flushCacheAction()">清空</button>
                </div>
            </div>
        </div>

        <div class="input-container">
            <button class="gear-btn" id="gear-btn" title="参数设置">
                <i class="fas fa-cog"></i>
            </button>
            <textarea id="question-input" rows="1" placeholder="输入您的问题，例如：雇主责任险和工伤保险有什么区别？" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="submit-btn" onclick="submitQuestion()">
                <i class="fas fa-arrow-up"></i>
            </button>
        </div>
        </div>
    </div>

    <script>
        // ============ 全局状态 ============
        const state = {
            isLoading: false,
            apiBaseUrl: window.location.origin,
            currentSessionId: localStorage.getItem('lastSessionId') || null,
            cacheLocal: { hit: 0, miss: 0, hitMsSum: 0, missMsSum: 0 },
        };

        // ============ DOM 引用 ============
        const el = {
            questionInput: document.getElementById('question-input'),
            submitBtn: document.getElementById('submit-btn'),
            chatArea: document.getElementById('chat-area'),
            messageList: document.getElementById('message-list'),
            emptyState: document.getElementById('empty-state'),
            paramsPanel: document.getElementById('params-panel'),
            gearBtn: document.getElementById('gear-btn'),
        };

        // ============ 工具函数 ============

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTimeAgo(dateStr) {
            if (!dateStr) return '未知';
            try {
                var date = new Date(dateStr);
                var now = new Date();
                var diff = Math.floor((now - date) / 1000);
                if (diff < 60) return '刚刚';
                if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
                if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
                if (diff < 604800) return Math.floor(diff / 86400) + '天前';
                return date.toLocaleDateString('zh-CN');
            } catch (e) { return dateStr; }
        }

        // ============ 对话流渲染 ============

        // 添加用户消息到对话流
        function addUserMessage(text) {
            var div = document.createElement('div');
            div.className = 'msg-row msg-row-user';
            div.innerHTML = '<div class="msg-bubble msg-bubble-user">' + escapeHtml(text) + '</div>';
            el.messageList.appendChild(div);
            scrollToBottom();
        }

        // 添加 AI 消息容器（返回消息元素，用于流式追加）
        function addAiMessage() {
            var div = document.createElement('div');
            div.className = 'msg-row msg-row-ai';
            div.innerHTML = '<div class="msg-avatar msg-avatar-ai">R</div>' +
                '<div style="flex:1;min-width:0;">' +
                '<div class="msg-header"><span class="msg-role-label">LocalRAG</span></div>' +
                '<div class="msg-bubble msg-bubble-ai" id="ai-msg-content"></div>' +
                '<div class="answer-footer" id="ai-msg-footer"></div>' +
                '<div id="ai-msg-sources"></div>'
                '</div>';
            el.messageList.appendChild(div);
            scrollToBottom();
            return {
                content: div.querySelector('#ai-msg-content'),
                footer: div.querySelector('#ai-msg-footer'),
                sources: div.querySelector('#ai-msg-sources'),
            };
        }

        // 显示"思考中"占位
        function addThinkingIndicator() {
            var div = document.createElement('div');
            div.className = 'msg-row msg-row-ai';
            div.id = 'thinking-indicator';
            div.innerHTML = '<div class="msg-avatar msg-avatar-ai">R</div>' +
                '<div style="flex:1;min-width:0;">' +
                '<div class="msg-header"><span class="msg-role-label">LocalRAG</span></div>' +
                '<div class="thinking-dots"><span></span><span></span><span></span></div>' +
                '</div>';
            el.messageList.appendChild(div);
            scrollToBottom();
        }

        function removeThinkingIndicator() {
            var ti = document.getElementById('thinking-indicator');
            if (ti) ti.remove();
        }

        function scrollToBottom() {
            requestAnimationFrame(function() {
                el.chatArea.scrollTop = el.chatArea.scrollHeight;
            });
        }

        // ============ 核心问答 ============

        async function submitQuestion() {
            if (state.isLoading) return;

            var question = el.questionInput.value.trim();
            if (!question) {
                el.questionInput.focus();
                return;
            }

            // 隐藏空状态
            el.emptyState.style.display = 'none';

            // 添加用户消息
            addUserMessage(question);
            el.questionInput.value = '';
            autoResize(el.questionInput);

            // 显示思考中
            addThinkingIndicator();

            // 参数
            var topK = parseInt(document.getElementById('top-k').value) || 10;
            var rerankTopK = parseInt(document.getElementById('rerank-top-k').value) || 3;
            var indexName = document.getElementById('index-name').value.trim() || 'cs_knowledge_base';

            var requestBody = {
                question: question,
                top_k: topK,
                rerank_top_k: rerankTopK,
                index_name: indexName,
                session_id: state.currentSessionId || undefined
            };

            state.isLoading = true;
            el.submitBtn.disabled = true;

            // 创建 AI 消息容器
            var aiMsg = addAiMessage();
            var aiContent = aiMsg.content;
            var aiFooter = aiMsg.footer;
            var aiSources = aiMsg.sources;

            // 移除思考中
            removeThinkingIndicator();

            // 打字光标
            aiContent.classList.add('typing-cursor');

            var sourcesData = [];
            var latencyData = null;

            try {
                var response = await fetch(state.apiBaseUrl + '/api/ask/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'text/event-stream'
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    console.warn('流式接口异常，降级到非流式 /api/ask');
                    await fallbackToNonStream(requestBody, aiContent, aiFooter, aiSources);
                    return;
                }

                var reader = response.body.getReader();
                var decoder = new TextDecoder('utf-8');
                var buffer = '';

                while (true) {
                    var result = await reader.read();
                    if (result.done) break;
                    buffer += decoder.decode(result.value, { stream: true });

                    var sepIdx;
                    while ((sepIdx = buffer.indexOf('\n\n')) >= 0) {
                        var rawEvent = buffer.slice(0, sepIdx);
                        buffer = buffer.slice(sepIdx + 2);
                        handleSseEvent(rawEvent, aiContent, aiFooter, aiSources);
                    }
                }
            } catch (error) {
                console.error('流式请求失败:', error);
                try {
                    await fallbackToNonStream(requestBody, aiContent, aiFooter, aiSources);
                } catch (e2) {
                    aiContent.textContent = '❌ 请求失败: ' + error.message;
                }
            } finally {
                state.isLoading = false;
                el.submitBtn.disabled = false;
                aiContent.classList.remove('typing-cursor');
            }
        }

        // SSE 事件处理
        function handleSseEvent(raw, contentEl, footerEl, sourcesEl) {
            var lines = raw.split('\n');
            var eventName = 'message';
            var dataStr = '';
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                if (line.startsWith('event:')) {
                    eventName = line.slice(6).trim();
                } else if (line.startsWith('data:')) {
                    dataStr += line.slice(5).trim();
                }
            }
            if (!dataStr) return;

            var data;
            try { data = JSON.parse(dataStr); } catch (e) { return; }

            switch (eventName) {
                case 'token':
                    contentEl.textContent += (data.text || '');
                    scrollToBottom();
                    break;
                case 'sources':
                    renderSourcesInline(data.sources || [], sourcesEl);
                    break;
                case 'latency':
                    renderLatencyInline(data, footerEl);
                    break;
                case 'done':
                    if (data && data.cache_status) {
                        renderCacheBadgeInline(data.cache_status, data.response_time_ms, footerEl);
                        accumulateLocalStats(data.cache_status, data.response_time_ms);
                        refreshCacheStats();
                    }
                    if (data && data.session_id) {
                        state.currentSessionId = data.session_id;
                        localStorage.setItem('lastSessionId', data.session_id);
                    }
                    loadSessions();
                    break;
                case 'error':
                    contentEl.textContent += '\n\n❌ ' + (data.message || '生成异常');
                    break;
            }
        }

        // 降级到非流式
        async function fallbackToNonStream(requestBody, contentEl, footerEl, sourcesEl) {
            var response = await fetch(state.apiBaseUrl + '/api/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });
            var data = await response.json();
            if (!response.ok) {
                throw new Error(data.detail && data.detail.message || '请求失败: ' + response.status);
            }
            contentEl.textContent = data.answer;
            renderSourcesInline(data.sources, sourcesEl);
            renderLatencyInline(data.latency, footerEl);
            if (data.cache_status) {
                renderCacheBadgeInline(data.cache_status, data.response_time_ms, footerEl);
                accumulateLocalStats(data.cache_status, data.response_time_ms);
                refreshCacheStats();
            }
            if (data.session_id) {
                state.currentSessionId = data.session_id;
                localStorage.setItem('lastSessionId', data.session_id);
            }
        }

        // ============ 渲染函数 ============

        // 来源（折叠面板）
        function toggleSources(btnId, panelId) {
            var panel = document.getElementById(panelId);
            var btn = document.getElementById(btnId);
            if (!panel || !btn) return;
            var isHidden = panel.classList.contains('hidden');
            if (isHidden) {
                panel.classList.remove('hidden');
                btn.innerHTML = btn.innerHTML.replace('▶', '▼');
            } else {
                panel.classList.add('hidden');
                btn.innerHTML = btn.innerHTML.replace('▼', '▶');
            }
        }

        function renderSourcesInline(sources, sourcesEl) {
            if (!sources || sources.length === 0) {
                sourcesEl.classList.add('hidden');
                return;
            }
            var uid = 'sources-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
            var btnId = uid + '-btn';
            var panelId = uid + '-panel';

            var html = '';
            html += '<button id="' + btnId + '" class="source-toggle-btn" onclick="toggleSources(\'' + btnId + '\', \'' + panelId + '\')">' +
                '<span>▶</span> 检索来源 (' + sources.length + ')</button>';
            html += '<div id="' + panelId + '" class="sources-panel hidden">';
            for (var i = 0; i < sources.length; i++) {
                var doc = sources[i];
                var bm25Score = doc.bm25_score !== undefined ? doc.bm25_score : (doc.es_score || 0);
                var vectorScore = doc.vector_score !== undefined ? doc.vector_score : 0;
                var contentSnippet = (doc.content || '').slice(0, 200);
                html += '<div class="source-item">' +
                    '<div class="source-title">#' + (i + 1) + ' ' + escapeHtml(doc.title || '未命名文档') + '</div>' +
                    '<div class="source-content">' + escapeHtml(contentSnippet) + '</div>' +
                    '<div class="source-score">BM25: ' + bm25Score.toFixed(1) + ' | 向量: ' + vectorScore.toFixed(2) +
                    (doc.source_file ? ' | ' + escapeHtml(doc.source_file) : '') + '</div>' +
                    '</div>';
            }
            html += '</div>';
            sourcesEl.innerHTML = html;
        }

        // 耗时（答案底部小字）
        function renderLatencyInline(latency, footerEl) {
            if (!latency) return;
            var total = Math.round(latency.total_ms || 0);
            var retrieval = Math.round(latency.retrieval_ms || 0);
            var rerank = Math.round(latency.rerank_ms || 0);
            var llm = Math.round(latency.llm_ms || 0);
            footerEl.innerHTML =
                '<span class="latency-item"><i class="fas fa-clock"></i> 总耗时 ' + total + 'ms</span>' +
                '<span class="latency-item">检索 ' + retrieval + 'ms</span>' +
                '<span class="latency-item">重排 ' + rerank + 'ms</span>' +
                '<span class="latency-item">LLM ' + llm + 'ms</span>';
        }

        // 缓存徽章
        function renderCacheBadgeInline(status, ms, footerEl) {
            if (!status) return;
            var isHit = status === 'HIT';
            var cls = isHit ? 'cache-badge-hit' : 'cache-badge-miss';
            var label = isHit ? 'HIT' : 'MISS';
            var timeText = '';
            if (typeof ms === 'number') {
                timeText = ms < 1000 ? Math.round(ms) + 'ms' : (ms / 1000).toFixed(2) + 's';
            }
            var badgeHtml = '<span class="cache-badge ' + cls + '"><span class="dot"></span>' + label + (timeText ? ' · ' + timeText : '') + '</span>';
            footerEl.innerHTML = badgeHtml + footerEl.innerHTML;
        }

        // ============ 缓存统计 ============

        function accumulateLocalStats(status, ms) {
            if (typeof ms !== 'number') return;
            if (status === 'HIT') {
                state.cacheLocal.hit += 1;
                state.cacheLocal.hitMsSum += ms;
            } else if (status === 'MISS') {
                state.cacheLocal.miss += 1;
                state.cacheLocal.missMsSum += ms;
            }
            var c = state.cacheLocal;
            var avgHit = c.hit > 0 ? Math.round(c.hitMsSum / c.hit) : null;
            var avgMiss = c.miss > 0 ? Math.round(c.missMsSum / c.miss) : null;
            var avgHitEl = document.getElementById('stat-avg-hit');
            var avgMissEl = document.getElementById('stat-avg-miss');
            if (avgHitEl) avgHitEl.textContent = avgHit === null ? '- ms' : avgHit + ' ms';
            if (avgMissEl) avgMissEl.textContent = avgMiss === null ? '- ms' : avgMiss + ' ms';
        }

        async function refreshCacheStats() {
            try {
                var resp = await fetch(state.apiBaseUrl + '/api/cache/stats');
                if (!resp.ok) throw new Error('stats接口异常');
                var s = await resp.json();
                document.getElementById('stat-total').textContent = s.total || 0;
                document.getElementById('stat-hit').textContent = s.hit || 0;
                document.getElementById('stat-miss').textContent = s.miss || 0;
                document.getElementById('stat-hitrate').textContent = (s.hit_rate || 0).toFixed(1) + '%';
                var avail = document.getElementById('cache-availability');
                if (avail) {
                    if (s.available) {
                        avail.textContent = 'Redis在线 · ' + (s.cached_keys || 0) + '条';
                        avail.style.color = '#52c41a';
                    } else if (s.enabled) {
                        avail.textContent = 'Redis不可达（降级）';
                        avail.style.color = '#d4a017';
                    } else {
                        avail.textContent = '缓存已关闭';
                        avail.style.color = '#5a5a7a';
                    }
                }
            } catch (e) { console.warn('刷新缓存统计失败:', e); }
        }

        async function flushCacheAction() {
            if (!confirm('确认清空 LocalRAG 缓存？')) return;
            try {
                var resp = await fetch(state.apiBaseUrl + '/api/cache/flush', { method: 'POST' });
                var data = await resp.json();
                state.cacheLocal = { hit: 0, miss: 0, hitMsSum: 0, missMsSum: 0 };
                document.getElementById('stat-avg-hit').textContent = '- ms';
                document.getElementById('stat-avg-miss').textContent = '- ms';
                refreshCacheStats();
            } catch (e) { alert('清空失败: ' + e.message); }
        }

        // ============ 会话管理 ============

        // 加载会话列表
        async function loadSessions() {
            try {
                var resp = await fetch(state.apiBaseUrl + '/api/sessions?limit=50');
                if (!resp.ok) throw new Error('加载失败');
                var data = await resp.json();
                renderSessionList(data.sessions || []);
            } catch (e) {
                document.getElementById('sidebar-list').innerHTML =
                    '<div class="text-center text-gray-500 py-8 text-xs"><i class="fas fa-exclamation-triangle text-sm mb-2"></i><p>加载失败</p></div>';
            }
        }

        // 渲染会话列表
        function renderSessionList(sessions) {
            var el = document.getElementById('sidebar-list');
            if (!sessions.length) {
                el.innerHTML =
                    '<div class="text-center text-gray-500 py-8 text-xs"><i class="fas fa-inbox text-sm mb-2"></i><p>暂无会话</p><p class="text-xs mt-1" style="color:#5a5a7a;">开始问答后自动创建</p></div>';
                return;
            }

            el.innerHTML = sessions.map(function(s) {
                var isActive = s.id === state.currentSessionId;
                var timeAgo = formatTimeAgo(s.updated_at);
                return '<div class="session-item' + (isActive ? ' active' : '') + '" data-session-id="' + s.id + '">' +
                    '<div class="session-icon"><i class="fas fa-comment"></i></div>' +
                    '<div class="session-info">' +
                    '<div class="session-title">' + escapeHtml(s.title) + '</div>' +
                    '<div class="session-meta">' + timeAgo + ' · ' + (s.message_count || 0) + ' 条</div>' +
                    '</div>' +
                    '<button class="session-del" onclick="event.stopPropagation();deleteSession(\'' + s.id + '\')" title="删除会话">' +
                    '<i class="fas fa-times"></i></button>' +
                    '</div>';
            }).join('');

            // 绑定点击切换
            el.querySelectorAll('.session-item').forEach(function(item) {
                item.addEventListener('click', function() {
                    switchSession(item.dataset.sessionId);
                });
            });
        }

        // 切换会话
        async function switchSession(sessionId) {
            state.currentSessionId = sessionId;
            localStorage.setItem('lastSessionId', sessionId);

            // 更新侧边栏高亮
            document.querySelectorAll('.session-item').forEach(function(el) {
                el.classList.remove('active');
                if (el.dataset.sessionId === sessionId) {
                    el.classList.add('active');
                }
            });

            // 窄屏自动收起侧边栏
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }

            // 清空消息列表
            el.messageList.innerHTML = '';
            el.emptyState.style.display = 'none';

            // 加载历史
            try {
                var resp = await fetch(state.apiBaseUrl + '/api/session/' + sessionId + '/history');
                if (resp.status === 404) {
                    state.currentSessionId = null;
                    localStorage.removeItem('lastSessionId');
                    el.messageList.innerHTML = '';
                    el.emptyState.style.display = 'flex';
                    loadSessions();
                    return;
                }
                if (resp.ok) {
                    var data = await resp.json();
                    if (data.history && data.history.length > 0) {
                        el.emptyState.style.display = 'none';
                        for (var i = 0; i < data.history.length; i++) {
                            var msg = data.history[i];
                            if (msg.role === 'user') {
                                addUserMessage(msg.content);
                            } else if (msg.role === 'assistant') {
                                var aiMsg = addAiMessage();
                                aiMsg.content.textContent = msg.content;
                                // 如果有来源/耗时信息，从消息元数据中提取
                                if (msg.metadata) {
                                    if (msg.metadata.latency) {
                                        renderLatencyInline(msg.metadata.latency, aiMsg.footer);
                                    }
                                    if (msg.metadata.sources && msg.metadata.sources.length > 0) {
                                        renderSourcesInline(msg.metadata.sources, aiMsg.sources);
                                    }
                                    if (msg.metadata.cache_status) {
                                        renderCacheBadgeInline(msg.metadata.cache_status, msg.metadata.response_time_ms, aiMsg.footer);
                                    }
                                }
                            }
                        }
                    } else {
                        el.emptyState.style.display = 'flex';
                    }
                }
            } catch (e) {
                console.warn('加载历史失败:', e);
                el.emptyState.style.display = 'flex';
            }

            loadSessions();
        }

        // 创建新会话
        async function createNewSession() {
            try {
                var resp = await fetch(state.apiBaseUrl + '/api/session/new', { method: 'POST' });
                if (!resp.ok) throw new Error('创建失败');
                var data = await resp.json();
                state.currentSessionId = data.session_id;
                localStorage.setItem('lastSessionId', data.session_id);

                // 清空
                el.messageList.innerHTML = '';
                el.emptyState.style.display = 'flex';
                el.questionInput.value = '';

                loadSessions();
            } catch (e) {
                console.error('创建会话失败:', e);
            }
        }

        // 删除会话
        async function deleteSession(sessionId) {
            if (!confirm('确定删除此会话？')) return;
            try {
                var resp = await fetch(state.apiBaseUrl + '/api/session/' + sessionId, { method: 'DELETE' });
                if (!resp.ok) throw new Error('删除失败');

                if (sessionId === state.currentSessionId) {
                    state.currentSessionId = null;
                    localStorage.removeItem('lastSessionId');
                    el.messageList.innerHTML = '';
                    el.emptyState.style.display = 'flex';
                }

                loadSessions();
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
        }

        // 切换侧边栏（移动端）
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // ============ 导出 ============

        async function exportReport(format) {
            if (!state.currentSessionId) {
                alert('请先发送一条消息创建会话');
                return;
            }
            var exportBtn = document.getElementById('export-btn');
            var originalHtml = exportBtn.innerHTML;
            exportBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            exportBtn.disabled = true;

            try {
                var savePath = exportPathState.currentPath;
                var body = {
                    session_id: state.currentSessionId,
                    title: '问答报告',
                    include_sources: true
                };
                if (savePath) body.save_path = savePath;

                var resp = await fetch(state.apiBaseUrl + '/api/export/' + format, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!resp.ok) {
                    var err = await resp.json();
                    throw new Error(err.detail || '导出失败');
                }
                if (savePath) {
                    var result = await resp.json();
                    var hint = document.getElementById('export-path-hint');
                    hint.textContent = '✅ 已保存到: ' + result.filepath;
                    hint.classList.remove('hidden');
                    setTimeout(function() { hint.classList.add('hidden'); }, 5000);
                } else {
                    var blob = await resp.blob();
                    var url = URL.createObjectURL(blob);
                    var a = document.createElement('a');
                    a.href = url;
                    var disposition = resp.headers.get('Content-Disposition');
                    var filenameMatch = disposition && disposition.match(/filename="?([^"]+)"?/);
                    a.download = filenameMatch ? filenameMatch[1] : 'report.' + format;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }
            } catch (e) {
                alert('导出失败: ' + e.message);
            } finally {
                exportBtn.innerHTML = originalHtml;
                exportBtn.disabled = false;
                document.getElementById('export-dropdown').classList.add('hidden');
            }
        }

        // ============ 导出路径下拉目录树 ============

        var exportPathState = {
            currentPath: '',
            history: JSON.parse(localStorage.getItem('export_path_history') || '[]'),
        };

        function togglePathTree(e) {
            if (e) e.stopPropagation();
            var tree = document.getElementById('export-path-tree');
            if (tree.classList.contains('open')) {
                tree.classList.remove('open');
            } else {
                tree.classList.add('open');
                loadTreeRoot();
            }
        }

        function clearExportPath() {
            exportPathState.currentPath = '';
            document.getElementById('export-path-text').textContent = '浏览器下载';
            var hint = document.getElementById('export-path-hint');
            hint.classList.add('hidden');
        }

        function selectTreePath(path) {
            var textEl = document.getElementById('export-path-text');
            if (!path) {
                clearExportPath();
            } else {
                exportPathState.currentPath = path;
                textEl.textContent = path;
                var hint = document.getElementById('export-path-hint');
                hint.textContent = '📁 ' + path;
                hint.classList.remove('hidden');
                var history = JSON.parse(localStorage.getItem('export_path_history') || '[]');
                history = [path].concat(history.filter(function(h) { return h !== path; })).slice(0, 5);
                localStorage.setItem('export_path_history', JSON.stringify(history));
                exportPathState.history = history;
            }
            document.getElementById('export-path-tree').classList.remove('open');
        }

        function loadTreeRoot() {
            var content = document.getElementById('export-path-tree-content');
            content.innerHTML = '<div class="text-center py-3 text-gray-500 text-xs"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>';

            fetch(state.apiBaseUrl + '/api/export/browse', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: '' })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var html = '';
                html += '<div class="tree-item" onclick="selectTreePath(\'\')"><span class="text-gray-500"><i class="fas fa-download"></i></span><span>浏览器下载</span></div>';
                html += '<div style="border-top:1px solid #2a2a4a;margin:4px 8px;"></div>';

                if (exportPathState.history.length > 0) {
                    html += '<div class="tree-section-label">最近使用</div>';
                    for (var i = 0; i < exportPathState.history.length; i++) {
                        var h = exportPathState.history[i];
                        html += '<div class="tree-item" onclick="selectTreePath(\'' + h + '\')"><span class="text-yellow-500">📁</span><span class="truncate">' + h + '</span></div>';
                    }
                    html += '<div style="border-top:1px solid #2a2a4a;margin:4px 8px;"></div>';
                }

                html += '<div class="tree-section-label">本地目录</div>';
                for (var i = 0; i < data.quick_dirs.length; i++) {
                    var qd = data.quick_dirs[i];
                    html += '<div class="tree-dir" data-path="' + qd.path + '">';
                    html += '<div class="tree-item" onclick="toggleTreeNode(this)"><span class="tree-arrow">▶</span><span class="text-yellow-500">📁</span><span class="truncate">' + qd.label + '</span></div>';
                    html += '<div class="tree-children hidden"></div></div>';
                }

                if (data.windows_drives && data.windows_drives.length > 0) {
                    html += '<div style="border-top:1px solid #2a2a4a;margin:4px 8px;"></div>';
                    html += '<div class="tree-section-label">Windows 文件系统</div>';
                    for (var i = 0; i < data.windows_drives.length; i++) {
                        var wd = data.windows_drives[i];
                        html += '<div class="tree-dir" data-path="' + wd.path + '">';
                        html += '<div class="tree-item" onclick="toggleTreeNode(this)"><span class="tree-arrow">▶</span><span class="text-blue-400">💿</span><span class="truncate">' + wd.label + '</span></div>';
                        html += '<div class="tree-children hidden"></div></div>';
                    }
                }

                if (data.wsl_paths && data.wsl_paths.length > 0) {
                    html += '<div style="border-top:1px solid #2a2a4a;margin:4px 8px;"></div>';
                    html += '<div class="tree-section-label">WSL 路径</div>';
                    for (var i = 0; i < data.wsl_paths.length; i++) {
                        var wp = data.wsl_paths[i];
                        html += '<div class="tree-dir" data-path="' + wp.path + '">';
                        html += '<div class="tree-item" onclick="toggleTreeNode(this)"><span class="tree-arrow">▶</span><span class="text-green-400">🐧</span><span class="truncate">' + wp.label + '</span></div>';
                        html += '<div class="tree-children hidden"></div></div>';
                    }
                }

                html += '<div style="border-top:1px solid #2a2a4a;margin:4px 8px;"></div>';
                html += '<div class="tree-dir" data-path="/">';
                html += '<div class="tree-item" onclick="toggleTreeNode(this)"><span class="tree-arrow">▶</span><span class="text-yellow-500">📁</span><span>/（根目录）</span></div>';
                html += '<div class="tree-children hidden"></div></div>';

                html += '<div class="tree-manual-input">' +
                    '<input id="tree-manual-input" type="text" placeholder="输入路径回车">' +
                    '<button onclick="selectTreePath(document.getElementById(\'tree-manual-input\').value)">确定</button></div>';

                content.innerHTML = html;

                setTimeout(function() {
                    var inp = document.getElementById('tree-manual-input');
                    if (inp) inp.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') selectTreePath(this.value);
                    });
                }, 100);
            })
            .catch(function(e) {
                content.innerHTML = '<div class="text-center py-3 text-red-400 text-xs">❌ ' + e.message + '</div>';
            });
        }

        function toggleTreeNode(el) {
            var dirDiv = el.closest('.tree-dir');
            if (!dirDiv) return;
            var children = dirDiv.querySelector('.tree-children');
            var arrow = el.querySelector('.tree-arrow');
            if (!children.classList.contains('hidden')) {
                children.classList.add('hidden');
                if (arrow) arrow.textContent = '▶';
                return;
            }
            if (arrow) arrow.textContent = '▼';
            children.classList.remove('hidden');
            if (children.children.length === 0) {
                children.innerHTML = '<div class="text-center py-2 text-gray-500 text-[10px]"><i class="fas fa-spinner fa-spin"></i></div>';
                var path = dirDiv.getAttribute('data-path');
                fetch(state.apiBaseUrl + '/api/export/browse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: path })
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var html = '';
                    html += '<div class="tree-item" onclick="selectTreePath(\'' + data.current_path + '\')" style="color:#6c63ff;"><span>✅</span><span>选择此目录</span></div>';
                    var hasDirs = false;
                    for (var i = 0; i < data.entries.length; i++) {
                        var entry = data.entries[i];
                        if (!entry.is_dir) continue;
                        hasDirs = true;
                        html += '<div class="tree-dir" data-path="' + entry.path + '">';
                        html += '<div class="tree-item" onclick="toggleTreeNode(this)"><span class="tree-arrow">▶</span><span class="text-yellow-500">📁</span><span class="truncate">' + entry.name + '</span></div>';
                        html += '<div class="tree-children hidden"></div></div>';
                    }
                    if (!hasDirs) html += '<div class="tree-item" style="color:#5a5a7a;">（空目录）</div>';
                    children.innerHTML = html;
                })
                .catch(function(e) {
                    children.innerHTML = '<div class="tree-item" style="color:#e74c3c;">❌ ' + e.message + '</div>';
                });
            }
        }

        // ============ 初始化 ============

        document.addEventListener('DOMContentLoaded', function() {
            // 齿轮面板切换
            el.gearBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                el.paramsPanel.classList.toggle('open');
            });
            document.addEventListener('click', function(e) {
                if (!el.paramsPanel.contains(e.target) && e.target !== el.gearBtn && !el.gearBtn.contains(e.target)) {
                    el.paramsPanel.classList.remove('open');
                }
            });

            // 回车提交
            el.questionInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    submitQuestion();
                }
            });

            // 导出下拉
            document.getElementById('export-btn').addEventListener('click', function(e) {
                e.stopPropagation();
                var dd = document.getElementById('export-dropdown');
                dd.classList.toggle('hidden');
            });
            document.addEventListener('click', function(e) {
                var dd = document.getElementById('export-dropdown');
                var container = document.getElementById('export-dropdown-container');
                if (!dd.classList.contains('hidden') && !container.contains(e.target)) {
                    dd.classList.add('hidden');
                }
            });

            document.getElementById('export-pdf-btn').addEventListener('click', function() { exportReport('pdf'); });
            document.getElementById('export-docx-btn').addEventListener('click', function() { exportReport('docx'); });

            document.getElementById('export-path-display').addEventListener('click', function(e) {
                e.stopPropagation();
                togglePathTree(e);
            });
            document.addEventListener('click', function(e) {
                var tree = document.getElementById('export-path-tree');
                var wrapper = document.getElementById('export-path-wrapper');
                if (tree.classList.contains('open') && !wrapper.contains(e.target)) {
                    tree.classList.remove('open');
                }
            });

            // 缓存统计
            refreshCacheStats();
            setInterval(refreshCacheStats, 15000);

            // 加载会话列表
            loadSessions();

            // 如果有上次的会话ID，自动加载
            if (state.currentSessionId) {
                switchSession(state.currentSessionId);
            }

            // 点击侧边栏外部关闭（移动端）
            document.getElementById('sidebar').addEventListener('click', function(e) {
                e.stopPropagation();
            });
            document.addEventListener('click', function(e) {
                var sidebar = document.getElementById('sidebar');
                var toggle = document.getElementById('sidebar-toggle');
                if (window.innerWidth <= 768 &&
                    sidebar.classList.contains('open') &&
                    !sidebar.contains(e.target) &&
                    !toggle.contains(e.target)) {
                    sidebar.classList.remove('open');
                }
            });
        });
    </script>
</body>
</html>

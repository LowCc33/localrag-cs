<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalRAG-CS 数据导入</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============ 全局 ============ */
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3a3a5c; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4a6c; }

        /* ============ 顶栏（与问答页一致） ============ */
        .topbar {
            background: #1e1e2e;
            border-bottom: 1px solid #2a2a4a;
            padding: 0 20px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .topbar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .topbar-logo .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #6c63ff, #7c6fff);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            color: #fff;
        }
        .topbar-logo .logo-text {
            font-size: 16px;
            font-weight: 700;
            color: #e0e0e0;
            letter-spacing: 0.5px;
        }
        .topbar-logo .logo-sub {
            font-size: 11px;
            color: #7a7a9a;
            margin-left: 4px;
        }

        .topbar-btn {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #3a3a5c;
            background: transparent;
            color: #9e9e9e;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .topbar-btn:hover {
            border-color: #6c63ff;
            color: #c0c0e0;
        }

        /* ============ 统计卡片 ============ */
        .stat-card {
            background: #1e1e32;
            border: 1px solid #3a3a5a;
            border-radius: 12px;
            padding: 20px;
        }
        .stat-card .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        .stat-card .stat-icon-blue { background: rgba(108,99,255,0.15); color: #6c63ff; }
        .stat-card .stat-icon-green { background: rgba(82,196,26,0.15); color: #52c41a; }
        .stat-card .stat-icon-purple { background: rgba(108,99,255,0.15); color: #6c63ff; }
        .stat-card .stat-label { font-size: 12px; color: #9e9e9e; }
        .stat-card .stat-value { font-size: 26px; font-weight: 700; color: #e0e0e0; line-height: 1.2; }

        /* ============ 面板通用 ============ */
        .panel {
            background: #1e1e32;
            border: 1px solid #3a3a5a;
            border-radius: 12px;
            padding: 20px;
        }
        .panel-title {
            font-size: 15px;
            font-weight: 600;
            color: #c0c0e0;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-title i { color: #6c63ff; }

        /* ============ 拖放区域 ============ */
        .drop-zone {
            border: 3px dashed #4a4a6a;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #1e1e32;
        }
        .drop-zone:hover { border-color: #5a5a7a; }
        .drop-zone.drag-over {
            border-color: #6c63ff;
            background: rgba(108,99,255,0.05);
        }
        .drop-zone .drop-icon { font-size: 48px; color: #4a4a6a; margin-bottom: 12px; }
        .drop-zone .drop-title { font-size: 16px; font-weight: 500; color: #9e9e9e; margin-bottom: 4px; }
        .drop-zone .drop-sub { font-size: 13px; color: #5a5a7a; margin-bottom: 8px; }
        .drop-zone .drop-hint { font-size: 11px; color: #4a4a6a; }

        /* ============ 按钮 ============ */
        .btn-primary {
            padding: 8px 20px;
            background: #6c63ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary:hover { background: #7c6fff; }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-secondary {
            padding: 8px 20px;
            background: transparent;
            color: #9e9e9e;
            border: 1px solid #3a3a5c;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-secondary:hover { border-color: #6c63ff; color: #c0c0e0; }

        .btn-success {
            padding: 8px 20px;
            background: #2d6a4f;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-success:hover { background: #3a8a5f; }
        .btn-success:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-sm {
            padding: 4px 12px;
            font-size: 11px;
            border-radius: 6px;
        }

        /* ============ 文件列表项 ============ */
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: #2a2a4a;
            border-radius: 8px;
            border: 1px solid #3a3a5c;
            transition: background 0.15s;
        }
        .file-item:hover { background: #32325a; }
        .file-item .file-icon { color: #5a5a7a; font-size: 20px; margin-right: 10px; }
        .file-item .file-name { font-size: 13px; color: #c0c0e0; font-weight: 500; }
        .file-item .file-size { font-size: 11px; color: #5a5a7a; }
        .file-item .file-del {
            width: 28px; height: 28px;
            border-radius: 6px;
            background: transparent;
            border: none;
            color: #5a5a7a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .file-item .file-del:hover { color: #e74c3c; background: rgba(231,76,60,0.1); }

        /* ============ 任务队列 ============ */
        .task-item {
            background: #2a2a4a;
            border: 1px solid #3a3a5c;
            border-radius: 10px;
            padding: 14px;
        }
        .task-item .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .task-item .task-id { font-size: 13px; font-weight: 600; color: #c0c0e0; }
        .task-item .task-status { font-size: 11px; padding: 2px 8px; border-radius: 9999px; font-weight: 600; }
        .status-pending { color: #5a5a7a; background: rgba(90,90,122,0.15); }
        .status-processing { color: #d4a017; background: rgba(212,160,23,0.15); }
        .status-completed { color: #52c41a; background: rgba(82,196,26,0.15); }
        .status-failed { color: #e74c3c; background: rgba(231,76,60,0.15); }

        .task-item .progress-track {
            width: 100%;
            height: 6px;
            background: #1e1e2e;
            border-radius: 3px;
            overflow: hidden;
        }
        .task-item .progress-bar {
            height: 100%;
            background: #6c63ff;
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        .task-item .task-stats { font-size: 11px; color: #5a5a7a; margin-top: 6px; }
        .task-item .task-stats span { display: inline-flex; align-items: center; gap: 3px; margin-right: 12px; }

        .task-item .task-actions {
            display: flex;
            gap: 4px;
        }
        .task-item .task-actions button {
            width: 26px; height: 26px;
            border-radius: 6px;
            background: transparent;
            border: none;
            color: #5a5a7a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            transition: all 0.15s;
        }
        .task-item .task-actions button:hover { background: rgba(108,99,255,0.1); color: #c0c0e0; }

        /* ============ 右侧信息面板 ============ */
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 12px;
        }
        .info-row .info-label { color: #7a7a9a; }
        .info-row .info-value { color: #c0c0e0; font-weight: 500; }

        /* 文件类型分布条 */
        .type-bar-track {
            width: 80px;
            height: 6px;
            background: #2a2a4a;
            border-radius: 3px;
            overflow: hidden;
        }
        .type-bar-fill {
            height: 100%;
            background: #6c63ff;
            border-radius: 3px;
        }

        /* 最近文档项 */
        .recent-doc-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: #2a2a4a;
            border-radius: 8px;
            border: 1px solid #3a3a5c;
            transition: background 0.15s;
            cursor: default;
        }
        .recent-doc-item:hover { background: #32325a; }
        .recent-doc-item .doc-icon { color: #5a5a7a; font-size: 18px; margin-right: 10px; flex-shrink: 0; }
        .recent-doc-item .doc-title { font-size: 12px; color: #c0c0e0; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .recent-doc-item .doc-meta { font-size: 10px; color: #5a5a7a; margin-top: 2px; }

        /* ============ 弹窗 ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 50;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 60px;
        }
        .modal-content {
            background: #1e1e32;
            border: 1px solid #3a3a5a;
            border-radius: 16px;
            width: 90%;
            max-width: 900px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a4a;
        }
        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #c0c0e0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-header h3 i { color: #6c63ff; }
        .modal-close {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: transparent;
            border: none;
            color: #5a5a7a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.15s;
        }
        .modal-close:hover { color: #c0c0e0; background: rgba(255,255,255,0.05); }
        .modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
        .modal-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-top: 1px solid #2a2a4a;
        }

        /* 弹窗搜索框 */
        .search-box {
            position: relative;
            margin-bottom: 12px;
        }
        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #5a5a7a;
            font-size: 12px;
        }
        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 32px;
            background: #2a2a4a;
            border: 1px solid #3a3a5c;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: #6c63ff; }
        .search-box input::placeholder { color: #5a5a7a; }

        /* 弹窗文档列表项 */
        .modal-doc-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: #2a2a4a;
            border-radius: 8px;
            border: 1px solid #3a3a5c;
            margin-bottom: 6px;
            transition: background 0.15s;
        }
        .modal-doc-item:hover { background: #32325a; }
        .modal-doc-item .doc-info { display: flex; align-items: center; flex: 1; min-width: 0; }
        .modal-doc-item .doc-icon { color: #5a5a7a; font-size: 18px; margin-right: 10px; flex-shrink: 0; }
        .modal-doc-item .doc-name { font-size: 12px; color: #c0c0e0; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .modal-doc-item .doc-detail { font-size: 10px; color: #5a5a7a; }
        .modal-doc-item .doc-type-tag {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 4px;
            background: #1e1e2e;
            color: #7a7a9a;
            font-weight: 600;
        }
        .modal-doc-item .doc-del {
            padding: 6px;
            border-radius: 6px;
            background: transparent;
            border: none;
            color: #5a5a7a;
            cursor: pointer;
            opacity: 0;
            transition: all 0.15s;
            font-size: 12px;
        }
        .modal-doc-item:hover .doc-del { opacity: 1; }
        .modal-doc-item .doc-del:hover { color: #e74c3c; background: rgba(231,76,60,0.1); }

        /* 分页按钮 */
        .page-btn {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            background: transparent;
            border: 1px solid #3a3a5c;
            color: #9e9e9e;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .page-btn:hover:not(:disabled) { border-color: #6c63ff; color: #c0c0e0; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-info { font-size: 11px; color: #5a5a7a; }

        /* ============ 通知 ============ */
        .notification {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 100;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            transform: translateX(120%);
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid;
        }
        .notification.show { transform: translateX(0); }
        .notification-success { background: #1a3a2a; border-color: #52c41a; color: #b7eb8f; }
        .notification-error { background: #3a1a1a; border-color: #e74c3c; color: #f5a5a5; }
        .notification-warning { background: #3a2a1a; border-color: #d4a017; color: #f5d78e; }
        .notification-info { background: #1a2a3a; border-color: #6c63ff; color: #b0b0ff; }

        /* ============ 错误提示 ============ */
        .error-box {
            background: rgba(231,76,60,0.1);
            border-left: 3px solid #e74c3c;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 11px;
            color: #f5a5a5;
            margin-top: 6px;
        }

        /* ============ 响应式 ============ */
        @media (max-width: 640px) {
            .stat-card .stat-value { font-size: 20px; }
        }
    </style>
</head>
<body>

    <!-- ============ 顶栏（与问答页一致） ============ -->
    <header class="topbar">
        <div class="topbar-logo">
            <div class="logo-icon">R</div>
            <span class="logo-text">LocalRAG-CS</span>
            <span class="logo-sub">数据导入</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
            <a href="/" class="topbar-btn">
                <i class="fas fa-comment-dots"></i>返回问答
            </a>
            <div style="display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(45,106,79,0.2);border-radius:9999px;font-size:11px;color:#52c41a;">
                <div style="width:6px;height:6px;background:#52c41a;border-radius:50%;"></div>
                <span id="backend-status-text">运行中</span>
            </div>
        </div>
    </header>

    <!-- ============ 主内容 ============ -->
    <div style="max-width:1200px;margin:0 auto;padding:24px 20px;">

        <!-- 统计面板 -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px;">
            <div class="stat-card">
                <div style="display:flex;align-items:center;gap:16px;">
                    <div class="stat-icon stat-icon-blue"><i class="fas fa-file-alt"></i></div>
                    <div>
                        <div class="stat-label">总文档数</div>
                        <div class="stat-value" id="total-docs">0</div>
                    </div>
                </div>
            </div>
            <div class="stat-card">
                <div style="display:flex;align-items:center;gap:16px;">
                    <div class="stat-icon stat-icon-green"><i class="fas fa-cubes"></i></div>
                    <div>
                        <div class="stat-label">总 Chunks</div>
                        <div class="stat-value" id="total-chunks">0</div>
                    </div>
                </div>
            </div>
            <div class="stat-card">
                <div style="display:flex;align-items:center;gap:16px;">
                    <div class="stat-icon stat-icon-purple"><i class="fas fa-hdd"></i></div>
                    <div>
                        <div class="stat-label">占用空间</div>
                        <div class="stat-value" id="total-size">0 MB</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 主区域：左2/3 + 右1/3 -->
        <div style="display:grid;grid-template-columns:1fr;gap:24px;">
            <div style="display:grid;grid-template-columns:2fr 1fr;gap:24px;">

                <!-- 左侧：上传 + 队列 + 最近导入 -->
                <div>
                    <!-- 上传区域 -->
                    <div class="panel" style="margin-bottom:20px;">
                        <div class="panel-title"><i class="fas fa-cloud-upload-alt"></i>上传文件</div>
                        <div id="drop-zone" class="drop-zone">
                            <div class="drop-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                            <div class="drop-title">拖放文件到此处</div>
                            <div class="drop-sub">或点击选择文件</div>
                            <div class="drop-hint">支持 .txt, .md, .pdf, .docx, .csv 格式</div>
                            <input type="file" id="file-input" class="hidden" multiple accept=".txt,.md,.pdf,.docx,.csv">
                            <div style="margin-top:16px;">
                                <button id="browse-btn" class="btn-primary">
                                    <i class="fas fa-folder-open"></i>选择文件
                                </button>
                            </div>
                        </div>

                        <!-- 文件列表预览 -->
                        <div id="file-list" class="hidden" style="margin-top:16px;">
                            <div style="font-size:13px;font-weight:600;color:#c0c0e0;margin-bottom:10px;">已选择文件</div>
                            <div id="selected-files" style="max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;"></div>
                            <div style="margin-top:12px;display:flex;justify-content:flex-end;gap:8px;">
                                <button id="clear-files" class="btn-secondary btn-sm">清空列表</button>
                                <button id="upload-btn" class="btn-success btn-sm"><i class="fas fa-upload"></i>开始导入</button>
                            </div>
                        </div>
                    </div>

                    <!-- 导入队列 -->
                    <div class="panel" style="margin-bottom:20px;">
                        <div class="panel-title"><i class="fas fa-tasks"></i>导入队列</div>
                        <div id="task-list">
                            <div id="empty-queue" style="text-align:center;padding:32px 0;color:#5a5a7a;">
                                <i class="fas fa-inbox" style="font-size:32px;margin-bottom:12px;display:block;"></i>
                                <p style="font-size:13px;">暂无导入任务</p>
                            </div>
                        </div>
                    </div>

                    <!-- 最近导入 -->
                    <div class="panel">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                            <div class="panel-title" style="margin-bottom:0;"><i class="fas fa-history"></i>最近导入</div>
                            <div style="display:flex;gap:6px;">
                                <button id="view-all-docs" class="btn-secondary btn-sm"><i class="fas fa-list"></i>查看全部</button>
                                <button id="refresh-docs" class="btn-secondary btn-sm" style="padding:4px 8px;"><i class="fas fa-redo"></i></button>
                            </div>
                        </div>
                        <div id="recent-docs" style="max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;">
                            <div style="text-align:center;padding:20px 0;color:#5a5a7a;">
                                <i class="fas fa-file-alt" style="font-size:24px;margin-bottom:8px;display:block;"></i>
                                <p style="font-size:12px;">暂无文档</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右侧：信息面板 -->
                <div style="display:flex;flex-direction:column;gap:16px;">
                    <!-- 系统信息 -->
                    <div class="panel">
                        <div class="panel-title"><i class="fas fa-info-circle"></i>系统信息</div>
                        <div>
                            <div class="info-row"><span class="info-label">后端状态</span><span class="info-value" id="backend-status"><span style="color:#52c41a;">在线</span></span></div>
                            <div class="info-row"><span class="info-label">支持格式</span><span class="info-value">txt, md, pdf, docx, csv</span></div>
                            <div class="info-row"><span class="info-label">最大文件</span><span class="info-value">100 MB</span></div>
                            <div class="info-row"><span class="info-label">并发任务</span><span class="info-value">3</span></div>
                        </div>
                    </div>

                    <!-- 知识库概览 -->
                    <div class="panel">
                        <div class="panel-title"><i class="fas fa-chart-pie"></i>知识库概览</div>
                        <div id="kb-overview">
                            <div id="file-type-dist" style="margin-bottom:12px;">
                                <div style="text-align:center;color:#5a5a7a;font-size:12px;padding:8px 0;">加载中...</div>
                            </div>
                            <div id="kb-activity" style="border-top:1px solid #2a2a4a;padding-top:10px;">
                                <div style="text-align:center;color:#5a5a7a;font-size:12px;padding:8px 0;">加载中...</div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- ============ 文档管理弹窗 ============ -->
    <div id="doc-modal" class="hidden">
        <div class="modal-overlay" id="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h3><i class="fas fa-database"></i>知识库文档管理</h3>
                    <button class="modal-close" id="modal-close"><i class="fas fa-times"></i></button>
                </div>
                <div class="modal-body">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="doc-search" placeholder="搜索文档...">
                    </div>
                    <div id="modal-doc-list">
                        <div style="text-align:center;padding:32px 0;color:#5a5a7a;">
                            <i class="fas fa-spinner fa-spin" style="font-size:24px;margin-bottom:8px;display:block;"></i>
                            <p style="font-size:12px;">加载中...</p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <div class="page-info" id="modal-page-info">第 0/0 页</div>
                    <div style="display:flex;gap:8px;">
                        <button class="page-btn" id="modal-prev-page" disabled><i class="fas fa-chevron-left"></i>上一页</button>
                        <button class="page-btn" id="modal-next-page" disabled>下一页<i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============ 通知容器 ============ -->
    <div id="notification-container"></div>

    <script>
        // ============ 全局变量 ============
        var selectedFiles = [];
        var activeTasks = new Map();
        var refreshInterval = null;
        var API_BASE = '/api/ingest';

        // ============ DOM 引用 ============
        var dropZone = document.getElementById('drop-zone');
        var fileInput = document.getElementById('file-input');
        var browseBtn = document.getElementById('browse-btn');
        var fileList = document.getElementById('file-list');
        var selectedFilesContainer = document.getElementById('selected-files');
        var clearFilesBtn = document.getElementById('clear-files');
        var uploadBtn = document.getElementById('upload-btn');
        var taskList = document.getElementById('task-list');
        var emptyQueue = document.getElementById('empty-queue');
        var recentDocs = document.getElementById('recent-docs');
        var refreshDocsBtn = document.getElementById('refresh-docs');

        // ========== 初始化 ==========

        function init() {
            checkBackendStatus();
            loadStats();
            loadRecentDocuments();
            setupEventListeners();
            startTaskRefresh();
        }

        async function checkBackendStatus() {
            try {
                var resp = await fetch(API_BASE + '/documents?limit=1');
                var el = document.getElementById('backend-status');
                if (resp.ok) {
                    el.innerHTML = '<span style="color:#52c41a;">在线</span>';
                } else {
                    el.innerHTML = '<span style="color:#d4a017;">部分异常</span>';
                }
            } catch (e) {
                document.getElementById('backend-status').innerHTML = '<span style="color:#e74c3c;">离线</span>';
            }
        }

        // ========== 文件拖放 ==========

        function setupEventListeners() {
            dropZone.addEventListener('dragover', function(e) {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            });
            dropZone.addEventListener('dragleave', function(e) {
                e.preventDefault();
                if (!dropZone.contains(e.relatedTarget)) {
                    dropZone.classList.remove('drag-over');
                }
            });
            dropZone.addEventListener('drop', function(e) {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                handleFiles(Array.from(e.dataTransfer.files));
            });
            dropZone.addEventListener('click', function() { fileInput.click(); });
            browseBtn.addEventListener('click', function() { fileInput.click(); });
            fileInput.addEventListener('change', function(e) {
                handleFiles(Array.from(e.target.files));
            });
            clearFilesBtn.addEventListener('click', clearFileList);
            uploadBtn.addEventListener('click', uploadFiles);
            refreshDocsBtn.addEventListener('click', loadRecentDocuments);
            document.getElementById('view-all-docs').addEventListener('click', openDocModal);
            document.getElementById('modal-close').addEventListener('click', closeDocModal);
            document.getElementById('modal-overlay').addEventListener('click', closeDocModal);
            document.getElementById('modal-prev-page').addEventListener('click', prevPage);
            document.getElementById('modal-next-page').addEventListener('click', nextPage);

            var searchTimer;
            document.getElementById('doc-search').addEventListener('input', function() {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(applyDocSearch, 300);
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && !document.getElementById('doc-modal').classList.contains('hidden')) {
                    closeDocModal();
                }
            });
        }

        function handleFiles(files) {
            var validFiles = files.filter(function(file) {
                var ext = file.name.split('.').pop().toLowerCase();
                return ['txt', 'md', 'pdf', 'docx', 'csv'].indexOf(ext) >= 0;
            });
            selectedFiles = selectedFiles.concat(validFiles);
            updateFileList();
            fileList.classList.remove('hidden');
            var invalidCount = files.length - validFiles.length;
            if (invalidCount > 0) {
                showNotification('跳过了 ' + invalidCount + ' 个不支持的文件', 'warning');
            }
        }

        function updateFileList() {
            selectedFilesContainer.innerHTML = '';
            selectedFiles.forEach(function(file, index) {
                var div = document.createElement('div');
                div.className = 'file-item';
                var icon = getFileIcon(file.name);
                div.innerHTML =
                    '<div style="display:flex;align-items:center;flex:1;min-width:0;">' +
                    '<span class="file-icon"><i class="' + icon + '"></i></span>' +
                    '<div style="flex:1;min-width:0;">' +
                    '<div class="file-name truncate">' + escapeHtml(file.name) + '</div>' +
                    '<div class="file-size">' + formatFileSize(file.size) + '</div>' +
                    '</div></div>' +
                    '<button class="file-del" data-index="' + index + '"><i class="fas fa-times"></i></button>';
                selectedFilesContainer.appendChild(div);
            });
            selectedFilesContainer.querySelectorAll('.file-del').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    removeFile(parseInt(e.currentTarget.dataset.index));
                });
            });
        }

        function getFileIcon(filename) {
            var ext = filename.split('.').pop().toLowerCase();
            var icons = { txt: 'fas fa-file-alt', md: 'fab fa-markdown', pdf: 'fas fa-file-pdf', docx: 'fas fa-file-word', csv: 'fas fa-file-csv' };
            return icons[ext] || 'fas fa-file';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            var k = 1024;
            var sizes = ['B', 'KB', 'MB', 'GB'];
            var i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
            if (selectedFiles.length === 0) fileList.classList.add('hidden');
        }

        function clearFileList() {
            selectedFiles = [];
            fileList.classList.add('hidden');
            fileInput.value = '';
        }

        // ========== 上传 ==========

        async function uploadFiles() {
            if (selectedFiles.length === 0) { showNotification('请先选择文件', 'warning'); return; }
            var oversized = selectedFiles.filter(function(f) { return f.size > 100 * 1024 * 1024; });
            if (oversized.length > 0) { showNotification('文件 ' + oversized[0].name + ' 超过100MB限制', 'error'); return; }

            var formData = new FormData();
            selectedFiles.forEach(function(f) { formData.append('files', f); });
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>上传中...';

            try {
                var resp = await fetch(API_BASE + '/upload', { method: 'POST', body: formData });
                if (!resp.ok) throw new Error('上传失败: ' + resp.status);
                var result = await resp.json();
                showNotification('任务创建成功: ' + result.task_id, 'success');
                clearFileList();
                addTaskToQueue(result);
            } catch (e) {
                showNotification('上传失败: ' + e.message, 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '<i class="fas fa-upload"></i>开始导入';
            }
        }

        // ========== 任务队列 ==========

        function addTaskToQueue(taskData) {
            emptyQueue.classList.add('hidden');
            var item = createTaskItem(taskData);
            taskList.insertBefore(item, taskList.firstChild);
            activeTasks.set(taskData.task_id, { element: item });
            pollTaskStatus(taskData.task_id);
        }

        function createTaskItem(taskData) {
            var div = document.createElement('div');
            div.className = 'task-item';
            div.id = 'task-' + taskData.task_id;
            var sc = getStatusClass(taskData.status);
            var si = getStatusIcon(taskData.status);
            div.innerHTML =
                '<div class="task-header">' +
                '<div><span class="task-id">任务 ' + taskData.task_id + '</span>' +
                '<span class="task-status ' + sc + '" style="margin-left:8px;"><i class="' + si + '"></i> ' + taskData.status + '</span></div>' +
                '<div class="task-actions">' +
                '<button class="refresh-task" data-task-id="' + taskData.task_id + '"><i class="fas fa-redo"></i></button>' +
                '<button class="cancel-task" data-task-id="' + taskData.task_id + '"><i class="fas fa-times"></i></button></div></div>' +
                '<div style="margin-bottom:6px;">' +
                '<div style="display:flex;justify-content:space-between;font-size:11px;color:#5a5a7a;margin-bottom:4px;">' +
                '<span>文件: ' + (taskData.valid_files || 0) + ' 个</span><span>' + (taskData.progress || 0) + '%</span></div>' +
                '<div class="progress-track"><div class="progress-bar" style="width:' + (taskData.progress || 0) + '%"></div></div></div>' +
                '<div class="task-stats">' +
                '<span><i class="fas fa-file"></i> 已处理: ' + (taskData.processed_files || 0) + '/' + (taskData.total_files || 0) + '</span>' +
                '<span><i class="fas fa-cube"></i> Chunks: ' + (taskData.processed_chunks || 0) + '/' + (taskData.total_chunks || 0) + '</span></div>' +
                '<div class="task-errors hidden"></div>';

            div.querySelector('.refresh-task').addEventListener('click', function(e) {
                pollTaskStatus(e.currentTarget.dataset.taskId);
            });
            div.querySelector('.cancel-task').addEventListener('click', function(e) {
                removeTaskFromQueue(e.currentTarget.dataset.taskId);
                showNotification('已取消任务', 'info');
            });
            return div;
        }

        function getStatusClass(status) {
            var m = { pending: 'status-pending', processing: 'status-processing', completed: 'status-completed', failed: 'status-failed' };
            return m[status] || 'status-pending';
        }

        function getStatusIcon(status) {
            var m = { pending: 'fas fa-clock', processing: 'fas fa-spinner fa-spin', completed: 'fas fa-check-circle', failed: 'fas fa-exclamation-circle' };
            return m[status] || 'fas fa-clock';
        }

        async function pollTaskStatus(taskId) {
            try {
                var resp = await fetch(API_BASE + '/status/' + taskId);
                if (!resp.ok) throw new Error('状态查询失败');
                var data = await resp.json();
                if (activeTasks.has(taskId)) {
                    var task = activeTasks.get(taskId);
                    updateTaskItem(task.element, data);
                    if (data.status === 'completed' || data.status === 'failed') {
                        setTimeout(function() { removeTaskFromQueue(taskId); }, 5000);
                        loadStats();
                        loadRecentDocuments();
                    }
                }
            } catch (e) { console.error('轮询任务状态失败', taskId, e); }
        }

        function updateTaskItem(el, data) {
            var statusSpan = el.querySelector('.task-status');
            if (statusSpan) {
                statusSpan.className = 'task-status ' + getStatusClass(data.status);
                statusSpan.innerHTML = '<i class="' + getStatusIcon(data.status) + '"></i> ' + data.status;
            }
            var bar = el.querySelector('.progress-bar');
            if (bar) bar.style.width = (data.progress || 0) + '%';
            var pct = el.querySelector('.task-header span:last-child');
            if (pct && pct.parentElement) {
                var pctSpan = pct.parentElement.querySelector('span:last-child');
                if (pctSpan) pctSpan.textContent = (data.progress || 0) + '%';
            }
            var stats = el.querySelectorAll('.task-stats span');
            if (stats.length >= 2) {
                stats[0].innerHTML = '<i class="fas fa-file"></i> 已处理: ' + (data.processed_files || 0) + '/' + (data.total_files || 0);
                stats[1].innerHTML = '<i class="fas fa-cube"></i> Chunks: ' + (data.processed_chunks || 0) + '/' + (data.total_chunks || 0);
            }
            if (data.errors && data.errors.length > 0) {
                var errEl = el.querySelector('.task-errors');
                errEl.classList.remove('hidden');
                errEl.innerHTML = '<div class="error-box"><i class="fas fa-exclamation-triangle" style="margin-right:4px;"></i>' + data.errors.join('<br>') + '</div>';
            }
        }

        function removeTaskFromQueue(taskId) {
            var task = activeTasks.get(taskId);
            if (task && task.element) task.element.remove();
            activeTasks.delete(taskId);
            if (activeTasks.size === 0) emptyQueue.classList.remove('hidden');
        }

        function startTaskRefresh() {
            refreshInterval = setInterval(function() {
                activeTasks.forEach(function(task, taskId) {
                    pollTaskStatus(taskId);
                });
            }, 10000);
        }

        // ========== 统计和文档 ==========

        async function loadStats() {
            try {
                var resp = await fetch(API_BASE + '/stats');
                if (resp.ok) {
                    var stats = await resp.json();
                    document.getElementById('total-docs').textContent = stats.total_documents || 0;
                    document.getElementById('total-chunks').textContent = (stats.total_chunks || 0).toLocaleString();
                    document.getElementById('total-size').textContent = stats.storage_used_mb
                        ? stats.storage_used_mb.toFixed(1) + ' MB'
                        : Math.round((stats.total_chunks || 0) * 0.1) + ' MB';
                    updateKbOverview(stats);
                }
            } catch (e) { console.error('加载统计数据失败:', e); }
        }

        async function updateKbOverview(stats) {
            try {
                var resp = await fetch(API_BASE + '/documents?limit=500&offset=0');
                if (!resp.ok) throw new Error('加载文档列表失败');
                var data = await resp.json();
                var docs = data.documents || [];
                var typeCount = {};
                docs.forEach(function(doc) {
                    var type = (doc.file_type || 'other').toUpperCase();
                    typeCount[type] = (typeCount[type] || 0) + 1;
                });
                var total = docs.length;
                var typeOrder = ['PDF', 'DOCX', 'MD', 'TXT', 'CSV'];
                var typeIcons = { PDF: 'fas fa-file-pdf', DOCX: 'fas fa-file-word', MD: 'fab fa-markdown', TXT: 'fas fa-file-alt', CSV: 'fas fa-file-csv' };
                var distEl = document.getElementById('file-type-dist');
                if (total === 0) {
                    distEl.innerHTML = '<div style="text-align:center;color:#5a5a7a;font-size:12px;padding:8px 0;">暂无文档</div>';
                } else {
                    distEl.innerHTML = typeOrder.filter(function(t) { return typeCount[t]; }).map(function(type) {
                        var count = typeCount[type] || 0;
                        var pct = ((count / total) * 100).toFixed(0);
                        var icon = typeIcons[type] || 'fas fa-file';
                        return '<div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;margin-bottom:6px;">' +
                            '<div style="display:flex;align-items:center;gap:6px;">' +
                            '<i class="' + icon + '" style="color:#5a5a7a;"></i>' +
                            '<span style="color:#9e9e9e;">' + type + '</span></div>' +
                            '<div style="display:flex;align-items:center;gap:6px;">' +
                            '<div class="type-bar-track"><div class="type-bar-fill" style="width:' + pct + '%"></div></div>' +
                            '<span style="color:#5a5a7a;font-size:10px;width:64px;text-align:right;">' + count + ' 个 (' + pct + '%)</span></div></div>';
                    }).join('');
                }
                var activityEl = document.getElementById('kb-activity');
                var lastImport = stats.last_import_time ? formatDate(stats.last_import_time) : '暂无';
                var completed24h = stats.completed_tasks_24h || 0;
                var failed24h = stats.failed_tasks_24h || 0;
                activityEl.innerHTML =
                    '<div class="info-row"><span class="info-label">最近导入</span><span class="info-value">' + lastImport + '</span></div>' +
                    '<div class="info-row"><span class="info-label">24h完成任务</span><span class="info-value" style="color:#52c41a;">' + completed24h + '</span></div>' +
                    '<div class="info-row"><span class="info-label">24h失败任务</span><span class="info-value" style="color:' + (failed24h > 0 ? '#e74c3c' : '#c0c0e0') + ';">' + failed24h + '</span></div>';
            } catch (e) { console.error('加载知识库概览失败:', e); }
        }

        async function loadRecentDocuments() {
            try {
                var resp = await fetch(API_BASE + '/documents?limit=10');
                if (!resp.ok) throw new Error('加载失败: ' + resp.status);
                var data = await resp.json();
                displayRecentDocuments(data.documents || []);
            } catch (e) {
                recentDocs.innerHTML = '<div style="text-align:center;padding:20px 0;color:#e74c3c;font-size:12px;"><i class="fas fa-exclamation-triangle" style="font-size:20px;margin-bottom:8px;display:block;"></i>加载失败</div>';
            }
        }

        function displayRecentDocuments(docs) {
            if (!docs || docs.length === 0) {
                recentDocs.innerHTML = '<div style="text-align:center;padding:20px 0;color:#5a5a7a;"><i class="fas fa-file-alt" style="font-size:24px;margin-bottom:8px;display:block;"></i><p style="font-size:12px;">暂无文档</p></div>';
                return;
            }
            recentDocs.innerHTML = '';
            docs.forEach(function(doc) {
                var div = document.createElement('div');
                div.className = 'recent-doc-item';
                var icon = getFileIcon(doc.title || 'unknown.txt');
                div.innerHTML =
                    '<span class="doc-icon"><i class="' + icon + '"></i></span>' +
                    '<div style="flex:1;min-width:0;">' +
                    '<div class="doc-title">' + escapeHtml(doc.title || '未命名文档') + '</div>' +
                    '<div class="doc-meta"><i class="fas fa-cube"></i> ' + (doc.chunks || 0) + ' · ' + formatDate(doc.import_time) + '</div></div>';
                recentDocs.appendChild(div);
            });
        }

        function formatDate(dateString) {
            if (!dateString) return '未知';
            try {
                var date = new Date(dateString);
                var now = new Date();
                var diffMs = now - date;
                var diffMins = Math.floor(diffMs / 60000);
                var diffHours = Math.floor(diffMs / 3600000);
                var diffDays = Math.floor(diffMs / 86400000);
                if (diffMins < 1) return '刚刚';
                if (diffMins < 60) return diffMins + '分钟前';
                if (diffHours < 24) return diffHours + '小时前';
                if (diffDays < 7) return diffDays + '天前';
                return date.toLocaleDateString('zh-CN');
            } catch (e) { return dateString; }
        }

        // ========== 文档管理弹窗 ==========

        var modalCurrentPage = 0;
        var modalTotalPages = 0;
        var modalAllDocs = [];
        var modalFilteredDocs = [];
        var MODAL_PAGE_SIZE = 50;

        function openDocModal() {
            document.getElementById('doc-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            loadAllDocuments();
        }

        function closeDocModal() {
            document.getElementById('doc-modal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        async function loadAllDocuments() {
            var listEl = document.getElementById('modal-doc-list');
            listEl.innerHTML = '<div style="text-align:center;padding:32px 0;color:#5a5a7a;"><i class="fas fa-spinner fa-spin" style="font-size:24px;margin-bottom:8px;display:block;"></i><p style="font-size:12px;">加载中...</p></div>';
            try {
                var resp = await fetch(API_BASE + '/documents?limit=500&offset=0');
                if (!resp.ok) throw new Error('加载失败');
                var data = await resp.json();
                modalAllDocs = data.documents || [];
                applyDocSearch();
            } catch (e) {
                listEl.innerHTML = '<div style="text-align:center;padding:32px 0;color:#e74c3c;font-size:12px;"><i class="fas fa-exclamation-triangle" style="font-size:24px;margin-bottom:8px;display:block;"></i>加载失败: ' + e.message + '</div>';
            }
        }

        function applyDocSearch() {
            var searchText = document.getElementById('doc-search').value.trim().toLowerCase();
            if (searchText) {
                modalFilteredDocs = modalAllDocs.filter(function(doc) {
                    return (doc.title || '').toLowerCase().indexOf(searchText) >= 0 ||
                           (doc.file_type || '').toLowerCase().indexOf(searchText) >= 0;
                });
            } else {
                modalFilteredDocs = modalAllDocs.slice();
            }
            modalTotalPages = Math.ceil(modalFilteredDocs.length / MODAL_PAGE_SIZE) || 1;
            modalCurrentPage = 0;
            renderDocPage();
        }

        function renderDocPage() {
            var listEl = document.getElementById('modal-doc-list');
            var pageInfo = document.getElementById('modal-page-info');
            var prevBtn = document.getElementById('modal-prev-page');
            var nextBtn = document.getElementById('modal-next-page');
            var start = modalCurrentPage * MODAL_PAGE_SIZE;
            var end = Math.min(start + MODAL_PAGE_SIZE, modalFilteredDocs.length);
            var pageDocs = modalFilteredDocs.slice(start, end);

            if (modalFilteredDocs.length === 0) {
                listEl.innerHTML = '<div style="text-align:center;padding:32px 0;color:#5a5a7a;"><i class="fas fa-inbox" style="font-size:24px;margin-bottom:8px;display:block;"></i><p style="font-size:12px;">暂无文档</p></div>';
                pageInfo.textContent = '第 0/0 页';
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                return;
            }

            listEl.innerHTML = pageDocs.map(function(doc) {
                var icon = getFileIcon(doc.title || 'unknown.txt');
                var typeLabel = (doc.file_type || '').toUpperCase();
                return '<div class="modal-doc-item" data-doc-id="' + escapeHtml(doc.doc_id) + '">' +
                    '<div class="doc-info">' +
                    '<span class="doc-icon"><i class="' + icon + '"></i></span>' +
                    '<div style="flex:1;min-width:0;">' +
                    '<div class="doc-name">' + escapeHtml(doc.title || '未命名文档') + '</div>' +
                    '<div class="doc-detail">' +
                    '<span class="doc-type-tag">' + typeLabel + '</span> ' +
                    '<i class="fas fa-cube"></i> ' + (doc.chunks || 0) + ' chunks · ' + formatDate(doc.import_time) +
                    '</div></div></div>' +
                    '<button class="doc-del delete-doc-btn" data-doc-id="' + escapeHtml(doc.doc_id) + '" data-doc-title="' + escapeHtml(doc.title || '未命名文档') + '" title="删除"><i class="fas fa-trash-alt"></i></button></div>';
            }).join('');

            listEl.querySelectorAll('.delete-doc-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    deleteDocument(e.currentTarget.dataset.docId, e.currentTarget.dataset.docTitle);
                });
            });

            var currentPageNum = modalCurrentPage + 1;
            pageInfo.textContent = '第 ' + currentPageNum + '/' + modalTotalPages + ' 页（共 ' + modalFilteredDocs.length + ' 条）';
            prevBtn.disabled = modalCurrentPage <= 0;
            nextBtn.disabled = modalCurrentPage >= modalTotalPages - 1;
        }

        async function deleteDocument(docId, docTitle) {
            if (!confirm('确定要删除「' + docTitle + '」吗？')) return;
            try {
                var resp = await fetch(API_BASE + '/' + docId, { method: 'DELETE' });
                if (!resp.ok) throw new Error('删除失败: ' + resp.status);
                var result = await resp.json();
                showNotification('已删除「' + docTitle + '」(' + (result.deleted_chunks || 0) + '个chunks)', 'success');
                loadAllDocuments();
                loadStats();
                loadRecentDocuments();
            } catch (e) {
                showNotification('删除失败: ' + e.message, 'error');
            }
        }

        function prevPage() {
            if (modalCurrentPage > 0) { modalCurrentPage--; renderDocPage(); }
        }

        function nextPage() {
            if (modalCurrentPage < modalTotalPages - 1) { modalCurrentPage++; renderDocPage(); }
        }

        // ========== 通知 ==========

        function showNotification(message, type) {
            type = type || 'info';
            var container = document.getElementById('notification-container');
            var n = document.createElement('div');
            n.className = 'notification notification-' + type;
            var icons = { success: 'fas fa-check-circle', error: 'fas fa-exclamation-circle', warning: 'fas fa-exclamation-triangle', info: 'fas fa-info-circle' };
            n.innerHTML = '<i class="' + (icons[type] || icons.info) + '"></i>' + escapeHtml(message);
            container.appendChild(n);
            setTimeout(function() { n.classList.add('show'); }, 10);
            setTimeout(function() {
                n.classList.remove('show');
                setTimeout(function() { if (n.parentNode) n.parentNode.removeChild(n); }, 300);
            }, 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== 页面初始化 ==========

        document.addEventListener('DOMContentLoaded', init);
        window.addEventListener('beforeunload', function() {
            if (refreshInterval) clearInterval(refreshInterval);
        });
    </script>
</body>
</html>
